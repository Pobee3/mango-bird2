<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mango-bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #fdf6ee;
    font-family: 'PingFang SC', 'Noto Sans SC', sans-serif;
    user-select: none;
  }

  body.desktop-mode {
    background: transparent;
  }

  body.desktop-mode .mango-wrap {
    width: min(220px, 28vw);
  }

  body.desktop-mode .mango-img,
  body.desktop-mode .bird-img {
    filter: none;
  }

  body.desktop-mode .bird-wrap {
    width: clamp(96px, 11vw, 142px);
  }

  body.desktop-mode .hint {
    display: none;
  }

  body.desktop-mode .reset-btn {
    display: none;
  }

  body.desktop-mode .bird-dialog {
    border-color: rgba(216, 239, 235, 0.42);
    background:
      radial-gradient(circle at 84% 8%, rgba(244, 178, 143, 0.24), transparent 37%),
      linear-gradient(145deg, rgba(240, 255, 252, 0.42), rgba(211, 247, 242, 0.34)),
      rgba(234, 253, 249, 0.43);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.62),
      inset 0 -10px 24px rgba(255, 255, 255, 0.14),
      0 18px 38px rgba(72, 126, 123, 0.07),
      0 4px 22px rgba(207, 125, 88, 0.035);
    backdrop-filter: blur(30px) saturate(1.18);
    -webkit-backdrop-filter: blur(30px) saturate(1.18);
  }

  body.desktop-mode .dialog-tabs {
    background:
      linear-gradient(90deg, rgba(237, 252, 248, 0.56), rgba(252, 230, 216, 0.44));
  }

  body.desktop-mode .dialog-tab.active {
    background:
      linear-gradient(145deg, rgba(252, 224, 209, 0.9), rgba(248, 206, 187, 0.76));
    color: #8a604f;
    box-shadow: 0 4px 12px rgba(172, 104, 72, 0.11);
  }

  body.desktop-mode .weather-bubble,
  body.desktop-mode .weather-bubble-hit {
    left: calc(50% + var(--head-pop-x, 0px));
    top: calc(50% + var(--head-pop-y, -33px) - (68px * var(--pet-ui-scale, 0.72)) - 16px);
    width: calc(60px * var(--pet-ui-scale, 0.72));
    height: calc(60px * var(--pet-ui-scale, 0.72));
    padding: 0 calc(5px * var(--pet-ui-scale, 0.72));
  }

  body.desktop-mode .weather-bubble {
    transform: translateX(-50%) translateY(calc(34px * var(--pet-ui-scale, 0.72))) scale(0.12);
  }

  body.desktop-mode .weather-bubble.spitting {
    animation-name: desktopWeatherBubbleSpit;
  }

  body.desktop-mode .weather-bubble.visible:not(.spitting) {
    animation-name: desktopWeatherBubbleFloat;
  }

  body.desktop-mode .weather-bubble::before {
    left: 50%;
    right: auto;
    bottom: calc(-7px * var(--pet-ui-scale, 0.72));
    width: calc(13px * var(--pet-ui-scale, 0.72));
    height: calc(13px * var(--pet-ui-scale, 0.72));
    transform: translateX(-50%);
  }

  body.desktop-mode .weather-bubble::after {
    left: 50%;
    right: auto;
    bottom: calc(-16px * var(--pet-ui-scale, 0.72));
    width: calc(6px * var(--pet-ui-scale, 0.72));
    height: calc(6px * var(--pet-ui-scale, 0.72));
    transform: translateX(-50%);
  }

  body.desktop-mode .weather-bubble-icon {
    font-size: calc(29px * var(--pet-ui-scale, 0.72));
  }

  body.desktop-mode .weather-bubble-temperature {
    right: calc(7px * var(--pet-ui-scale, 0.72));
    bottom: calc(7px * var(--pet-ui-scale, 0.72));
    font-size: calc(11px * var(--pet-ui-scale, 0.72));
  }

  body.desktop-mode .reminder-pop {
    left: calc(50% + var(--head-pop-x, 0px));
    top: calc(50% + var(--head-pop-y, -33px) - (70px * var(--pet-ui-scale, 0.72)) - 5px);
    min-width: calc(58px * var(--pet-ui-scale, 0.72));
    max-width: min(320px, calc(100vw - 28px));
    padding:
      calc(11px * var(--pet-ui-scale, 0.72))
      calc(14px * var(--pet-ui-scale, 0.72));
    border-radius: calc(22px * var(--pet-ui-scale, 0.72));
    font-size: 12px;
    line-height: 1.4;
    white-space: normal;
    overflow-wrap: anywhere;
    transform: translateX(-50%) translateY(calc(34px * var(--pet-ui-scale, 0.72))) scale(0.2);
  }

  body.desktop-mode .reminder-pop.visible {
    animation-name: desktopReminderPopIn;
  }

  body.desktop-mode .reminder-pop.hiding {
    animation-name: desktopReminderPopOut;
  }

  body.desktop-mode .reminder-pop.icon-only {
    min-width: calc(58px * var(--pet-ui-scale, 0.72));
    min-height: calc(58px * var(--pet-ui-scale, 0.72));
    padding: calc(8px * var(--pet-ui-scale, 0.72));
    border-radius: calc(22px * var(--pet-ui-scale, 0.72));
    font-size: calc(2rem * var(--pet-ui-scale, 0.72));
  }

  body.desktop-mode .reminder-pop.custom {
    border-radius: calc(20px * var(--pet-ui-scale, 0.72));
    font-size: 12px;
  }

  .stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    cursor: default;
    touch-action: none;
  }

  .stage.closed {
    display: none;
  }

  .mango-context-menu {
    position: absolute;
    z-index: 9;
    right: -32%;
    top: calc(38% - 3px);
    min-width: 72px;
    padding: 8px 8px;
    border: 1px solid rgba(255, 255, 255, 0.86);
    border-radius: 20px;
    background: rgba(246, 251, 253, 0.94);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.8),
      inset 0 -5px 12px rgba(205, 222, 230, 0.16),
      0 0 12px rgba(235, 248, 252, 0.46),
      0 9px 22px rgba(68, 75, 78, 0.12);
    opacity: 0;
    transform: translate(-82px, 55px) scale(0.2);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .mango-context-menu[hidden] {
    display: none;
  }

  .mango-context-menu button {
    width: 100%;
    min-height: 22px;
    border: 0;
    background: transparent;
    color: #687174;
    font: inherit;
    font-size: 0.8rem;
    line-height: 1.35;
    text-align: center;
    padding: 0;
    cursor: pointer;
  }

  .mango-context-menu button:hover {
    color: #4e5a5e;
  }

  .mango-context-menu.visible {
    animation: mangoMenuPopIn 0.58s cubic-bezier(0.2, 0.9, 0.24, 1.2) forwards;
  }

  /* ---- Mango ---- */
  .mango-wrap {
    position: absolute;
    left: 50%;
    top: 50%;
    width: min(350px, 49vw);
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 4;
    transform-origin: center;
    transition: transform 0.18s ease, opacity 0.25s ease;
  }

  .mango-wrap:hover { transform: translate(-50%, -50%) scale(1.04); }
  .mango-wrap:active { transform: translate(-50%, -50%) scale(0.96); }

  .mango-img {
    display: block;
    width: 100%;
    height: auto;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.18));
    pointer-events: none;
    transform-origin: 50% 58%;
    animation: mangoBreath 1.8s ease-in-out infinite;
  }

  /* ---- Bird ---- */
  .bird-wrap {
    position: absolute;
    left: 0;
    top: 0;
    width: clamp(150px, 22vw, 230px);
    opacity: 0;
    z-index: 8;
    pointer-events: none;
    transform: translate(-50%, -50%) translate3d(0, 0, 0) scale(0.3);
    transform-origin: center 76%;
    will-change: transform, opacity;
  }

  .bird-wrap.ready {
    pointer-events: auto;
    cursor: pointer;
  }

  .bird-img {
    position: relative;
    z-index: 2;
    display: block;
    width: 100%;
    height: auto;
    filter: drop-shadow(0 8px 22px rgba(0,0,0,0.2));
    transform-origin: 50% 50%;
    will-change: transform;
    pointer-events: none;
  }

  .bird-wrap.idle .bird-img {
    animation: birdIdle 1.6s ease-in-out infinite;
  }

  .bird-wrap.nuzzle .bird-img {
    animation: birdNuzzle 0.7s ease-in-out infinite;
  }

  .bird-wrap.nuzzle.has-frames .bird-img {
    animation: none;
    transform: scaleX(var(--face, 1));
  }

  .bird-wrap.chase .bird-img {
    animation: birdRunFlap 0.34s ease-in-out infinite;
  }

  .bird-wrap.chase.has-frames .bird-img {
    animation: none;
    transform: scaleX(var(--face, 1));
  }

  .bird-wrap.peck .bird-img {
    animation: birdPeck 0.28s ease-in-out 3;
  }

  .bird-wrap.peck.has-frames .bird-img {
    animation: none;
    transform: scaleX(var(--face, 1));
  }

  .bird-wrap.sleeping .bird-img {
    animation: birdSleepBreath 2.4s ease-in-out infinite;
  }

  .bird-wrap.waking .bird-img {
    animation: none;
    transform: scaleX(var(--face, 1));
  }

  .bird-wrap.headBlink .bird-img {
    animation: none;
    transform: scaleX(var(--face, 1));
  }

  .bird-wrap.dialogPerch .bird-img {
    animation: birdPerchBreath 4.8s ease-in-out infinite;
    transform-origin: 50% 90%;
    transform: scaleX(var(--face, 1));
  }

  .bird-wrap.dialogPerch.perch-tilt .bird-img {
    animation: birdPerchTilt 1.15s ease-in-out;
  }

  .bird-wrap.dialogPerch {
    z-index: 34;
  }

  /* ---- Weather ---- */
  .weather-bubble {
    position: absolute;
    z-index: 5;
    left: -25%;
    top: -16%;
    width: clamp(50px, 6vw, 60px);
    min-width: 0;
    height: clamp(50px, 6vw, 60px);
    padding: 0 5px;
    display: block;
    border: 1px solid rgba(255, 255, 255, 0.86);
    border-radius: 50%;
    background:
      radial-gradient(circle at 31% 24%, rgba(255,255,255,0.95) 0 7%, transparent 8%),
      radial-gradient(circle at 42% 37%, rgba(255,255,255,0.38), transparent 58%),
      rgba(238, 249, 251, 0.52);
    box-shadow:
      inset -5px -7px 12px rgba(129, 183, 205, 0.08),
      0 7px 18px rgba(86, 115, 128, 0.17);
    backdrop-filter: blur(7px);
    pointer-events: none;
    opacity: 0;
    transform: translate(var(--bubble-from-x, 160px), 62px) scale(0.12);
    transform-origin: center;
  }

  .weather-bubble::before {
    content: "";
    position: absolute;
    left: auto;
    right: -6px;
    bottom: 8px;
    width: 13px;
    height: 13px;
    border: 1px solid rgba(255, 255, 255, 0.78);
    border-radius: 50%;
    background: inherit;
    box-shadow: 0 3px 7px rgba(86, 115, 128, 0.08);
  }

  .weather-bubble::after {
    content: "";
    position: absolute;
    left: auto;
    right: -13px;
    bottom: 2px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(241, 250, 251, 0.8);
    box-shadow: 0 2px 5px rgba(86, 115, 128, 0.08);
  }

  .weather-bubble.spitting {
    animation: weatherBubbleSpit 0.78s cubic-bezier(0.2, 0.9, 0.24, 1.25) forwards;
  }

  .weather-bubble.visible:not(.spitting) {
    opacity: 1;
    animation: weatherBubbleFloat 2.6s ease-in-out infinite;
  }

  .weather-bubble.bursting {
    pointer-events: none;
    animation: weatherBubbleBurst 0.34s ease-out forwards;
  }

  .weather-bubble-spark {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    opacity: 0;
    background: rgba(197, 235, 246, 0.94);
    box-shadow: 0 0 5px rgba(255, 255, 255, 0.9);
    pointer-events: none;
  }

  .weather-bubble.bursting .weather-bubble-spark {
    animation: weatherBubbleSpark 0.38s ease-out forwards;
    animation-delay: var(--spark-delay, 0s);
  }

  .weather-bubble-hit {
    position: absolute;
    z-index: 6;
    left: -25%;
    top: -16%;
    width: clamp(50px, 6vw, 60px);
    height: clamp(50px, 6vw, 60px);
    border: 0;
    border-radius: 999px;
    background: transparent;
    cursor: pointer;
    pointer-events: none;
    opacity: 0;
  }

  .weather-bubble-hit.active {
    pointer-events: auto;
  }

  .weather-bubble-icon {
    position: absolute;
    left: 48%;
    top: 45%;
    font-size: clamp(23px, 3.2vw, 29px);
    line-height: 1;
    filter: drop-shadow(0 2px 3px rgba(76, 58, 40, 0.12));
    transform: translate(-50%, -50%);
  }

  .weather-bubble-temperature {
    position: absolute;
    right: 7px;
    bottom: 7px;
    color: #58747b;
    font-size: clamp(9px, 1.2vw, 11px);
    font-weight: 750;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.72);
    transform: rotate(-12deg);
    transform-origin: center;
  }

  .reminder-pop {
    position: absolute;
    z-index: 7;
    left: -32%;
    top: calc(-30% + 11px);
    min-width: 58px;
    max-width: 190px;
    padding: 11px 14px;
    border: 1px solid rgba(255, 255, 255, 0.9);
    border-radius: 22px;
    background: rgba(246, 251, 253, 0.94);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.82),
      inset 0 -5px 12px rgba(205, 222, 230, 0.16),
      0 0 12px rgba(235, 248, 252, 0.46),
      0 9px 22px rgba(68, 75, 78, 0.12);
    color: #5d6b70;
    pointer-events: none;
    opacity: 0;
    transform: translate(82px, 55px) scale(0.2);
    backdrop-filter: blur(8px);
  }

  .reminder-pop.visible {
    animation: reminderPopIn 0.58s cubic-bezier(0.2, 0.9, 0.24, 1.2) forwards;
  }

  .reminder-pop.hiding {
    animation: reminderPopOut 0.28s ease-in forwards;
  }

  .reminder-pop.icon-only {
    display: grid;
    place-items: center;
    min-width: 58px;
    min-height: 58px;
    padding: 8px;
    border-radius: 22px;
    font-size: 2rem;
  }

  .reminder-pop.custom {
    border-radius: 20px;
    line-height: 1.45;
    font-size: 0.8rem;
    word-break: break-word;
  }

  /* ---- Reminder timer ---- */
  .bird-dialog {
    position: fixed;
    z-index: 30;
    width: min(304px, calc(100vw - 28px));
    padding: 18px;
    border: 1px solid rgba(226, 198, 178, 0.42);
    border-radius: 22px;
    background:
      radial-gradient(circle at 82% 8%, rgba(244, 178, 143, 0.2), transparent 34%),
      linear-gradient(145deg, rgba(229, 255, 251, 0.22), rgba(185, 232, 226, 0.09)),
      rgba(215, 244, 239, 0.08);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.42),
      0 14px 34px rgba(72, 126, 123, 0.08),
      0 4px 18px rgba(207, 125, 88, 0.035);
    backdrop-filter: blur(20px) saturate(1.08);
    -webkit-backdrop-filter: blur(20px) saturate(1.08);
    color: #597674;
    max-height: calc(100vh - 48px);
    overflow: hidden;
    transform-origin: 82% 0;
    animation: dialogPop 0.22s cubic-bezier(0.2, 0.85, 0.28, 1.2);
    cursor: grab;
    touch-action: none;
  }

  .bird-dialog.dragging {
    cursor: grabbing;
    user-select: none;
  }

  .bird-dialog button,
  .bird-dialog input,
  .bird-dialog textarea,
  .bird-dialog label {
    cursor: auto;
  }

  .bird-dialog[hidden],
  .timer-badge[hidden] {
    display: none;
  }

  .bird-dialog h2 {
    font-size: 0.96rem;
    line-height: 1.35;
  }

  .dialog-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-right: 88px;
    margin-bottom: 12px;
    padding: 3px;
    border: 1px solid rgba(211, 180, 159, 0.4);
    border-radius: 13px;
    background:
      linear-gradient(90deg, rgba(237, 252, 248, 0.54), rgba(252, 230, 216, 0.38));
  }

  .dialog-tab {
    min-height: 31px;
    border: 0;
    border-radius: 9px;
    background: transparent;
    color: #72908e;
    font: inherit;
    font-size: 0.76rem;
    cursor: pointer !important;
  }

  .dialog-tab.active {
    background: rgba(250, 218, 199, 0.72);
    box-shadow: 0 3px 10px rgba(172, 104, 72, 0.09);
    color: #87604f;
    font-weight: 700;
  }

  .dialog-view[hidden] {
    display: none;
  }

  .chat-view {
    min-height: 330px;
  }

  .chat-heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .chat-title {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.9rem !important;
  }

  .chat-title-avatar {
    width: 34px;
    height: 30px;
    flex: 0 0 auto;
    border: 0;
    border-radius: 0;
    object-fit: contain;
  }

  .chat-clear {
    border: 0;
    background: transparent;
    color: #8aa09e;
    font-size: 0.68rem;
    cursor: pointer !important;
  }

  .chat-messages {
    display: flex;
    flex-direction: column;
    gap: 7px;
    height: 227px;
    margin-top: 10px;
    padding: 4px 3px 4px 0;
    overflow-y: auto;
    overscroll-behavior: contain;
    scrollbar-width: thin;
    scrollbar-color: rgba(145, 196, 191, 0.5) transparent;
  }

  .chat-empty {
    margin: auto;
    max-width: 210px;
    color: #89a09d;
    font-size: 0.76rem;
    line-height: 1.55;
    text-align: center;
  }

  .chat-message {
    max-width: 88%;
    padding: 8px 10px;
    border-radius: 13px;
    font-size: 0.76rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    user-select: text;
  }

  .chat-message.user {
    align-self: flex-end;
    border-bottom-right-radius: 5px;
    background: rgba(188, 231, 226, 0.62);
    color: #496c69;
  }

  .chat-message.assistant {
    align-self: flex-start;
    border-bottom-left-radius: 5px;
    background: rgba(255, 253, 249, 0.66);
    color: #6f675e;
  }

  .chat-message.pending {
    color: #849693;
    animation: hintPulse 1.2s infinite;
  }

  .chat-form {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 38px;
    gap: 7px;
    margin-top: 10px;
  }

  .chat-provider-buttons {
    display: none;
    position: absolute;
    left: 50%;
    top: -104px;
    z-index: 2;
    width: 208px;
    height: 74px;
    transform: translateX(-50%);
    pointer-events: none;
  }

  .chat-form.api-config:not(.provider-selected) .chat-provider-buttons {
    display: block;
  }

  .chat-provider-button {
    position: absolute;
    min-width: 86px;
    height: 34px;
    border: 1px solid rgba(171, 219, 218, 0.48);
    border-radius: 14px;
    background: rgba(222, 247, 246, 0.72);
    color: #547b78;
    font: inherit;
    font-size: 0.72rem;
    font-weight: 650;
    box-shadow:
      0 8px 18px rgba(79, 139, 137, 0.08),
      inset 0 0 0 1px rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    cursor: pointer !important;
    pointer-events: auto;
    transform-origin: center;
  }

  .chat-provider-button.deepseek {
    left: 4px;
    top: 4px;
    --provider-rest-transform: rotate(-2deg);
    transform: translateY(14px) scale(0.98) var(--provider-rest-transform);
    animation: providerFloatIn 1.56s cubic-bezier(0.22, 0.72, 0.28, 1) forwards;
  }

  .chat-provider-button.glm {
    right: 4px;
    top: 34px;
    --provider-rest-transform: rotate(2deg);
    transform: translateY(14px) scale(0.98) var(--provider-rest-transform);
    animation: providerFloatIn 1.56s cubic-bezier(0.22, 0.72, 0.28, 1) 0.2s forwards;
  }

  .chat-provider-button:hover {
    border-color: rgba(145, 207, 207, 0.62);
    background: rgba(214, 244, 243, 0.82);
    color: #496f6c;
  }

  .chat-provider-button:focus-visible {
    outline: 2px solid rgba(132, 201, 194, 0.68);
    outline-offset: 2px;
  }

  @keyframes providerFloatIn {
    0% {
      opacity: 0;
      transform: translateY(14px) scale(0.98) var(--provider-rest-transform);
    }
    72% {
      opacity: 1;
      transform: translateY(-1px) scale(1) var(--provider-rest-transform);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1) var(--provider-rest-transform);
    }
  }

  .chat-input {
    width: 100%;
    height: 42px;
    min-height: 42px;
    max-height: 92px;
    padding: 10px;
    border: 1px solid rgba(157, 211, 205, 0.72);
    border-radius: 12px;
    outline: none;
    resize: none;
    background: rgba(238, 253, 250, 0.58);
    color: #486d69;
    font: inherit;
    font-size: 0.78rem;
    line-height: 20px;
    user-select: text;
  }

  .chat-input:focus {
    border-color: rgba(132, 201, 194, 0.82);
    background: rgba(228, 250, 246, 0.76);
  }

  .bird-dialog.chat-mode .chat-input {
    border-color: rgba(219, 211, 174, 0.5);
    background: rgba(255, 253, 241, 0.74);
    color: #526f6c;
  }

  .bird-dialog.chat-mode .chat-input:focus {
    border-color: rgba(211, 201, 163, 0.56);
    background: rgba(255, 252, 237, 0.78);
  }

  .bird-dialog.chat-mode .chat-input::placeholder {
    color: #9f9b88;
  }

  .chat-send {
    display: inline-grid;
    place-items: center;
    width: 38px;
    padding: 0;
    border: 1px solid rgba(146, 207, 201, 0.62);
    border-radius: 12px;
    background: rgba(182, 230, 225, 0.64);
    color: #476d69;
    font-size: 1rem;
    cursor: pointer !important;
  }

  .chat-send:disabled {
    cursor: wait !important;
    opacity: 0.5;
  }

  .bird-dialog.chat-mode .chat-send {
    border-color: rgba(211, 197, 150, 0.62);
    background: rgba(248, 241, 211, 0.9);
    color: #8b7946;
  }

  .chat-send svg {
    display: block;
    width: 16px;
    height: 16px;
    margin: 0;
    fill: none;
    stroke: currentColor;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-width: 1.8;
    transform: translate(1px, -1px) rotate(-45deg);
    transform-origin: center;
  }

  .chat-error {
    min-height: 17px;
    margin-top: 4px;
    color: #aa6659;
    font-size: 0.68rem;
  }

  .bird-dialog-copy {
    margin-top: 3px;
    color: #92745e;
    font-size: 0.84rem;
    line-height: 1.55;
  }

  .timer-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 9px;
  }

  .timer-option {
    position: relative;
    isolation: isolate;
    overflow: hidden;
    min-height: 42px;
    padding: 8px;
    border: 1px solid rgba(206, 241, 239, 0.42);
    border-radius: 12px;
    background: rgba(239, 255, 254, 0.16);
    color: #597674;
    cursor: pointer;
    transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
  }

  .timer-option:hover {
    transform: translateY(-2px);
    border-color: rgba(170, 226, 222, 0.66);
    background: rgba(226, 252, 250, 0.32);
  }

  .timer-option::before {
    content: "";
    position: absolute;
    z-index: -1;
    inset: 0;
    width: var(--timer-progress, 0%);
    border-radius: inherit;
    background:
      linear-gradient(90deg, rgba(138, 221, 214, 0.28), rgba(178, 242, 236, 0.62));
    box-shadow:
      inset -2px 0 5px rgba(225, 255, 252, 0.74),
      0 0 8px rgba(118, 218, 210, 0.34);
    transition: width 0.2s linear;
  }

  .timer-option-countdown {
    display: none;
    font-size: 0.9rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.03em;
  }

  .timer-option-phase {
    display: none;
    margin-bottom: 2px;
    color: #668a84;
    font-size: 0.66rem;
    font-weight: 650;
    letter-spacing: 0.08em;
  }

  .bird-dialog.timer-running {
    width: min(142px, calc(100vw - 28px));
    padding: 12px;
  }

  .bird-dialog.timer-running h2,
  .bird-dialog.timer-running .dialog-tabs,
  .bird-dialog.timer-running .chat-view,
  .bird-dialog.timer-running .custom-reminder,
  .bird-dialog.timer-running .memo-list,
  .bird-dialog.timer-running .timer-option:not(.active-timer) {
    display: none;
  }

  .bird-dialog.timer-running .timer-options {
    grid-template-columns: 1fr;
    margin-top: 0;
  }

  .bird-dialog.timer-running .timer-option.active-timer {
    width: 112px;
    min-height: 46px;
    transform: none;
    border-color: rgba(157, 224, 218, 0.68);
  }

  .bird-dialog.timer-running .timer-option-label,
  .bird-dialog.timer-menu-expanded .timer-option.active-timer .timer-option-label {
    display: none;
  }

  .bird-dialog.timer-running .timer-option-countdown,
  .bird-dialog.timer-menu-expanded .timer-option.active-timer .timer-option-countdown {
    display: inline;
  }

  .bird-dialog.timer-running .timer-option-phase,
  .bird-dialog.timer-menu-expanded .timer-option.active-timer .timer-option-phase {
    display: block;
  }

  .bird-dialog.timer-menu-expanded .timer-option:not(.active-timer) {
    opacity: 0.48;
  }

  .bird-dialog.timer-paused {
    z-index: 32;
    width: min(248px, calc(100vw - 28px));
  }

  .bird-dialog.timer-paused .timer-options {
    grid-template-columns: 112px auto;
    align-items: center;
  }

  .timer-pause-actions {
    display: none;
    grid-template-columns: auto auto;
    gap: 5px;
  }

  .bird-dialog.timer-paused .timer-pause-actions {
    display: grid;
  }

  .timer-pause-action {
    height: 34px;
    padding: 0 9px;
    border: 1px solid rgba(157, 218, 214, 0.58);
    border-radius: 9px;
    background: rgba(195, 235, 232, 0.5);
    color: #456c69;
    font-size: 0.74rem;
    cursor: pointer;
  }

  .timer-pause-action.cancel {
    background: rgba(239, 226, 220, 0.48);
    border-color: rgba(224, 198, 187, 0.58);
    color: #81665e;
  }

  .custom-reminder {
    margin-top: 12px;
    padding-top: 11px;
    border-top: 1px solid rgba(206, 241, 239, 0.34);
  }

  .custom-reminder-title {
    font-size: 0.96rem;
    line-height: 1.35;
    font-weight: 650;
  }

  .custom-reminder-fields {
    display: grid;
    grid-template-columns: 1fr 38px;
    gap: 7px;
    width: 100%;
    margin-top: 8px;
  }

  .custom-reminder-submit {
    display: inline-grid;
    place-items: center;
    width: 38px;
    padding: 0;
    border: 1px solid rgba(146, 207, 201, 0.62);
    border-radius: 12px;
    background: rgba(182, 230, 225, 0.64);
    color: #476d69;
    font-size: 1rem;
    cursor: pointer !important;
  }

  .custom-reminder-submit svg {
    display: block;
    width: 16px;
    height: 16px;
    margin: 0;
    fill: none;
    stroke: currentColor;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-width: 1.8;
    transform: translate(1px, -1px) rotate(-45deg);
    transform-origin: center;
  }

  .custom-reminder textarea {
    width: 100%;
    min-width: 0;
    max-width: 100%;
    height: 42px;
    min-height: 42px;
    border: 1px solid rgba(157, 211, 205, 0.72);
    border-radius: 12px;
    padding: 11px 9px 9px;
    background: rgba(238, 253, 250, 0.58);
    color: #486d69;
    font: inherit;
    font-size: 0.78rem;
    line-height: 20px;
    user-select: text;
    resize: none;
    overflow: hidden;
    outline: none;
    transition: border-color 0.16s ease, background 0.16s ease;
  }

  .custom-reminder textarea:focus {
    border-color: rgba(132, 201, 194, 0.82);
    background: rgba(228, 250, 246, 0.76);
  }

  .custom-reminder-error {
    min-height: 0;
    margin-top: 4px;
    color: #b05e50;
    font-size: 0.74rem;
  }

  .memo-list {
    display: grid;
    gap: 4px;
    margin-top: 9px;
    max-height: min(356px, calc(100vh - 260px));
    padding-right: 2px;
    overflow-y: auto;
    overscroll-behavior: contain;
    scrollbar-width: thin;
    scrollbar-color: rgba(145, 196, 191, 0.5) transparent;
  }

  .memo-list:empty {
    display: none;
  }

  .memo-item {
    display: grid;
    grid-template-columns: 12px 1fr 18px;
    align-items: start;
    gap: 5px;
    width: 100%;
    padding: 3px 5px;
    border: 1px solid rgba(218, 207, 196, 0.46);
    border-radius: 7px;
    background: rgba(255, 255, 253, 0.42);
    color: #766b62;
  }

  .memo-item.done {
    opacity: 0.52;
  }

  .memo-item.done .memo-text {
    text-decoration: line-through;
  }

  .memo-check {
    width: 11px;
    height: 11px;
    margin-top: 1px;
    accent-color: #c9b49d;
    cursor: pointer;
  }

  .memo-text {
    display: block;
    font-size: 0.68rem;
    line-height: 1.2;
    word-break: break-word;
  }

  .memo-time {
    display: block;
    margin-top: 2px;
    color: #9a8d82;
    font-size: 0.6rem;
    line-height: 1.2;
  }

  .memo-delete {
    width: 17px;
    height: 17px;
    border: 0;
    border-radius: 50%;
    background: transparent;
    color: #aaa097;
    cursor: pointer;
  }

  .timer-option strong {
    font-size: 0.9rem;
  }

  .tomato-progress {
    display: inline-flex;
    align-items: center;
    gap: 1px;
    min-height: 16px;
    margin-left: 4px;
    vertical-align: -2px;
  }

  .tomato-progress:empty {
    display: none;
  }

  .tomato-mark {
    display: inline-block;
    font-size: 0.72rem;
    line-height: 1;
  }

  .tomato-mark.half {
    width: 0.39rem;
    overflow: hidden;
    white-space: nowrap;
  }

  .timer-badge {
    position: absolute;
    left: 20px;
    top: 20px;
    z-index: 20;
    min-width: 112px;
    padding: 8px 12px;
    border: 1px solid rgba(213, 174, 125, 0.44);
    border-radius: 20px 20px 15px 15px;
    background: rgba(255, 252, 247, 0.72);
    box-shadow: 0 7px 18px rgba(112, 76, 43, 0.08);
    color: #674d3b;
    cursor: pointer;
    text-align: left;
    backdrop-filter: blur(10px);
  }

  .timer-badge-label {
    display: block;
    color: #96765e;
    font-size: 0.7rem;
  }

  .timer-badge-label::before {
    content: "⌛️ ";
  }

  .timer-badge-time {
    display: block;
    margin-top: 1px;
    font-size: 0.98rem;
    font-variant-numeric: tabular-nums;
  }

  /* ---- Shadow ---- */
  .shadow {
    position: absolute;
    left: 0;
    top: 0;
    width: 120px;
    height: 16px;
    opacity: 0;
    background: radial-gradient(ellipse, rgba(80, 61, 45, 0.15) 0%, rgba(80, 61, 45, 0.04) 55%, transparent 72%);
    border-radius: 50%;
    z-index: 1;
    pointer-events: none;
    transform: translate(-50%, 72px);
    transition: opacity 0.25s ease, width 0.2s ease;
  }

  .shadow.perch-hidden {
    opacity: 0 !important;
  }

  /* ---- Hint ---- */
  .hint {
    position: absolute;
    left: 50%;
    bottom: max(28px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    color: #9a8068;
    font-size: 0.92rem;
    letter-spacing: 0.04em;
    animation: hintPulse 2s infinite;
    z-index: 10;
    pointer-events: none;
  }

  @keyframes hintPulse {
    0%,100% { opacity: 0.48; }
    50% { opacity: 1; }
  }

  @keyframes mangoBreath {
    0%,100% {
      transform: scale(1);
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.18));
    }
    50% {
      transform: scale(1.035) translateY(-3px);
      filter: drop-shadow(0 12px 28px rgba(0,0,0,0.16));
    }
  }

  @keyframes weatherBubbleSpit {
    0% {
      opacity: 0;
      transform: translate(var(--bubble-from-x, 160px), 62px) scale(0.12);
    }
    34% { opacity: 1; }
    72% { transform: translate(-5px, -4px) scale(1.08); }
    100% {
      opacity: 1;
      transform: translate(0, 0) scale(1);
    }
  }

  @keyframes weatherBubbleFloat {
    0%,100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-6px) rotate(1.5deg); }
  }

  @keyframes desktopWeatherBubbleSpit {
    0% {
      opacity: 0;
      transform: translateX(-50%) translateY(calc(34px * var(--pet-ui-scale, 0.72))) scale(0.12);
    }
    34% { opacity: 1; }
    72% {
      transform: translateX(-50%) translateY(calc(-4px * var(--pet-ui-scale, 0.72))) scale(1);
    }
    100% {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }
  }

  @keyframes desktopWeatherBubbleFloat {
    0%,100% { transform: translateX(-50%) translateY(0) rotate(-1deg); }
    50% { transform: translateX(-50%) translateY(calc(-6px * var(--pet-ui-scale, 0.72))) rotate(1.5deg); }
  }

  @keyframes weatherBubbleBurst {
    0% { opacity: 1; transform: scale(1); }
    45% { opacity: 0.9; transform: scale(1.32); }
    100% { opacity: 0; transform: scale(1.7); }
  }

  @keyframes weatherBubbleSpark {
    0% { opacity: 0.9; transform: translate(-50%, -50%) scale(0.5); }
    100% {
      opacity: 0;
      transform: translate(calc(-50% + var(--spark-x)), calc(-50% + var(--spark-y))) scale(1.25);
    }
  }

  /* ---- Particles ---- */
  .particle {
    position: absolute;
    z-index: 6;
    pointer-events: none;
    background: gold;
  }

  .particle.star-4 {
    clip-path: polygon(50% 0%, 61% 38%, 100% 50%, 61% 62%, 50% 100%, 39% 62%, 0% 50%, 39% 38%);
  }

  .particle.diamond {
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  }

  .particle.spark {
    clip-path: polygon(50% 0%, 65% 35%, 100% 45%, 70% 55%, 80% 100%, 50% 65%, 20% 100%, 30% 55%, 0% 45%, 35% 35%);
  }

  /* ---- Reset ---- */
  .reset-btn {
    position: absolute;
    top: 20px;
    right: 24px;
    background: #f0e0d0;
    border: 0;
    padding: 8px 18px;
    border-radius: 18px;
    font-size: 0.85rem;
    color: #6a5040;
    cursor: pointer;
    z-index: 20;
    transition: background 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
    opacity: 0.5;
  }

  .reset-btn:hover {
    background: #e0c8b0;
    opacity: 1;
    transform: translateY(-1px);
  }

  @keyframes birdIdle {
    0%,100% { transform: translateY(0) rotate(0deg) scaleX(var(--face, 1)); }
    50% { transform: translateY(-2px) rotate(-0.6deg) scaleX(var(--face, 1)); }
  }

  @keyframes birdNuzzle {
    0%,100% { transform: translateX(-3px) translateY(0) rotate(-3deg) scaleX(var(--face, 1)); }
    50% { transform: translateX(6px) translateY(-2px) rotate(3deg) scaleX(var(--face, 1)); }
  }

  @keyframes birdRunFlap {
    0%,100% { transform: translateY(0) rotate(-4deg) skewX(-1deg) scaleX(var(--face, 1)); }
    35% { transform: translateY(-5px) rotate(5deg) skewX(2deg) scaleX(var(--face, 1)); }
    70% { transform: translateY(1px) rotate(-2deg) skewX(-2deg) scaleX(var(--face, 1)); }
  }

  @keyframes birdPeck {
    0%,100% { transform: translateX(0) rotate(0deg) scaleX(var(--face, 1)); }
    45% { transform: translateX(var(--peck-x, 18px)) translateY(4px) rotate(var(--peck-rot, 13deg)) scaleX(var(--face, 1)); }
  }

  @keyframes birdSleepBreath {
    0%,100% { transform: translateY(0) scaleX(var(--face, 1)); }
    50% { transform: translateY(1px) scaleX(var(--face, 1)); }
  }

  @keyframes birdPerchTilt {
    0%, 100% { transform: scaleX(var(--face, 1)) scaleY(1) rotate(0deg); }
    42%, 68% { transform: scaleX(var(--face, 1)) scaleY(1.008) rotate(2.2deg); }
  }

  @keyframes birdPerchBreath {
    0%, 100% { transform: scaleX(var(--face, 1)) scaleY(1); }
    50% { transform: scaleX(var(--face, 1)) scaleY(1.012); }
  }

  @keyframes dialogPop {
    from { opacity: 0; transform: scale(0.86) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes reminderBounce {
    from { opacity: 0; transform: translateY(20px) scale(0.88); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes reminderPopIn {
    0% { opacity: 0; transform: translate(82px, 55px) scale(0.2); }
    72% { opacity: 1; transform: translate(-4px, -3px) scale(1.06); }
    100% { opacity: 1; transform: translate(0, 0) scale(1); }
  }

  @keyframes reminderPopOut {
    from { opacity: 1; transform: translate(0, 0) scale(1); }
    to { opacity: 0; transform: translateY(-8px) scale(0.84); }
  }

  @keyframes desktopReminderPopIn {
    0% { opacity: 0; transform: translateX(-50%) translateY(calc(34px * var(--pet-ui-scale, 0.72))) scale(0.2); }
    72% { opacity: 1; transform: translateX(-50%) translateY(calc(-3px * var(--pet-ui-scale, 0.72))) scale(1.04); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  }

  @keyframes desktopReminderPopOut {
    from { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    to { opacity: 0; transform: translateX(-50%) translateY(calc(-8px * var(--pet-ui-scale, 0.72))) scale(0.84); }
  }

  @keyframes mangoMenuPopIn {
    0% { opacity: 0; transform: translate(-82px, 55px) scale(0.2); }
    72% { opacity: 1; transform: translate(4px, -3px) scale(1.06); }
    100% { opacity: 1; transform: translate(0, 0) scale(1); }
  }

  @media (max-width: 620px) {
    .reset-btn {
      top: 14px;
      right: 14px;
      padding: 7px 14px;
    }

    .hint {
      font-size: 0.84rem;
      width: calc(100vw - 32px);
      text-align: center;
    }

    .timer-badge {
      left: 14px;
      top: 14px;
      min-width: 116px;
      padding: 8px 12px;
    }

    .bird-dialog {
      position: fixed;
      width: min(304px, calc(100vw - 24px));
      max-height: calc(100vh - 74px);
      overflow-y: auto;
    }

  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="shadow" id="shadow"></div>

  <div class="mango-wrap" id="mangoWrap">
    <img class="mango-img" id="mangoImg" src="assets/芒果_nobg.png" alt="芒果">
  </div>

  <div class="bird-wrap" id="birdWrap" aria-label="小鸟" role="img">
    <img class="bird-img" id="birdImg" src="assets/终图_绿翅.png" alt="">
    <div class="weather-bubble" id="weatherBubble" aria-hidden="true">
      <span class="weather-bubble-icon" id="weatherBubbleIcon" aria-hidden="true"></span>
      <span class="weather-bubble-temperature" id="weatherBubbleTemperature"></span>
      <span class="weather-bubble-spark" style="--spark-x:-34px;--spark-y:-25px"></span>
      <span class="weather-bubble-spark" style="--spark-x:3px;--spark-y:-40px;--spark-delay:.02s"></span>
      <span class="weather-bubble-spark" style="--spark-x:35px;--spark-y:-18px;--spark-delay:.04s"></span>
      <span class="weather-bubble-spark" style="--spark-x:39px;--spark-y:20px;--spark-delay:.01s"></span>
      <span class="weather-bubble-spark" style="--spark-x:4px;--spark-y:38px;--spark-delay:.05s"></span>
      <span class="weather-bubble-spark" style="--spark-x:-35px;--spark-y:23px;--spark-delay:.03s"></span>
    </div>
    <button class="weather-bubble-hit" id="weatherBubbleHit" type="button" aria-label="当前天气，点击关闭，右键重新定位天气"></button>
    <div class="reminder-pop" id="reminderPop" aria-live="assertive"></div>
    <div class="mango-context-menu" id="mangoContextMenu" hidden role="menu" aria-label="Mango 菜单">
      <button id="closeMango" type="button" role="menuitem">回巢</button>
    </div>
  </div>

  <div class="hint" id="hint">点一下芒果</div>
  <button class="timer-badge" id="timerBadge" type="button" hidden aria-label="查看当前计时">
    <span class="timer-badge-label" id="timerBadgeLabel">正在计时</span>
    <strong class="timer-badge-time" id="timerBadgeTime">25:00</strong>
  </button>

  <section class="bird-dialog" id="timerDialog" role="dialog" aria-modal="false" aria-label="mango-bird 工具" hidden>
    <div class="dialog-tabs" role="tablist" aria-label="小鸟工具">
      <button class="dialog-tab active" id="chatTab" type="button" role="tab" aria-selected="true" data-dialog-view="chat">问小鸟</button>
      <button class="dialog-tab" id="timerTab" type="button" role="tab" aria-selected="false" data-dialog-view="timer">计时提醒</button>
    </div>
    <div class="dialog-view chat-view" id="chatView" role="tabpanel">
      <div class="chat-heading">
        <h2 class="chat-title">
          <img class="chat-title-avatar" src="assets/mango-chat-avatar.png" alt="">
          <span>有什么想问的？</span>
        </h2>
        <button class="chat-clear" id="chatClear" type="button">清空对话</button>
      </div>
      <div class="chat-messages" id="chatMessages" aria-live="polite">
        <div class="chat-empty">临时遇到知识问题就问我吧。<br>这次页面关闭后，我就不记得啦。</div>
      </div>
      <form class="chat-form" id="chatForm">
        <div class="chat-provider-buttons" id="chatProviderButtons" aria-label="选择模型服务">
          <button class="chat-provider-button deepseek" type="button" data-provider="deepseek">DeepSeek</button>
          <button class="chat-provider-button glm" type="button" data-provider="glm">GLM</button>
        </div>
        <textarea class="chat-input" id="chatInput" rows="1" maxlength="1200" placeholder="问一个问题…" aria-label="给小鸟的问题"></textarea>
        <button class="chat-send" id="chatSend" type="submit" aria-label="发送">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m3.5 4.5 17 7.5-17 7.5 3.2-7.5-3.2-7.5Z"></path>
          </svg>
        </button>
      </form>
      <div class="chat-error" id="chatError" aria-live="polite"></div>
    </div>
    <div class="dialog-view timer-view" id="timerView" role="tabpanel" hidden>
      <h2 id="timerDialogTitle">🍅 番茄钟 <span class="tomato-progress" id="tomatoProgress" aria-label="已完成番茄钟"></span></h2>

function later(callback, delay) {

}

function setPetState(nextState) {

function clearPerchIdleMotion() {

  birdWrap.classList.remove('perch-tilt');

function schedulePerchIdleMotion() {
  if (pet.perchMotionTimer) clearTimeout(pet.perchMotionTimer);
  if (pet.perchTiltTimer) clearTimeout(pet.perchTiltTimer);
  if (!reminderTimer.dialogOpen || pet.state !== 'dialogPerch') return;
  pet.perchMotionTimer = setTimeout(
    playPerchBlink,
    20000
  );
  pet.perchTiltTimer = setTimeout(playPerchTilt, 20000);
}

function playPerchBlink() {
  pet.perchMotionTimer = null;
  if (!reminderTimer.dialogOpen || pet.state !== 'dialogPerch') return;

  const blinkFrames = (loadedFrames.headBlink || []).filter(Boolean);
  if (blinkFrames.length >= 4) {
    const sequence = [0, 1, 2, 3, 2, 1, 0];
    let index = 0;
    const step = () => {
      if (!reminderTimer.dialogOpen || pet.state !== 'dialogPerch') return;
      birdImg.src = blinkFrames[Math.min(sequence[index], blinkFrames.length - 1)];
      index += 1;
      if (index < sequence.length) {
        pet.perchFrameTimer = setTimeout(step, 150);
      } else {
        pet.perchFrameTimer = setTimeout(() => {
          pet.perchFrameTimer = null;
          restoreDefaultBirdImage();
          pet.perchMotionTimer = setTimeout(
            playPerchBlink,
            20000
          );
        }, 150);
      }
    };
    step();
    return;
  }
  pet.perchMotionTimer = setTimeout(playPerchBlink, 20000);
}

function playPerchTilt() {
  pet.perchTiltTimer = null;
  if (!reminderTimer.dialogOpen || pet.state !== 'dialogPerch') return;
  birdWrap.classList.remove('perch-tilt');

}

function formatRemainingTime(milliseconds) {
  const totalSeconds = Math.max(0, Math.ceil(milliseconds / 1000));
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  const minuteText = hours > 0
    ? String(minutes).padStart(2, '0')
    : String(minutes);
  return `${hours > 0 ? `${hours}:` : ''}${minuteText}:${String(seconds).padStart(2, '0')}`;
}

function updateReminderCountdown() {
  if (!['running', 'paused'].includes(reminderTimer.pomodoroState)) return;
  const now = reminderTimer.pomodoroState === 'paused'
    ? reminderTimer.pausedAt
    : Date.now();
  const remaining = reminderTimer.phaseEndAt - now;
  const progress = clamp(
    (now - reminderTimer.phaseStartedAt) / reminderTimer.phaseDuration,
    0,
    1
  );

  if (reminderTimer.activeButton) {
    updateTimerPhaseLabel();
    const countdown = reminderTimer.activeButton.querySelector('.timer-option-countdown');
    if (countdown) countdown.textContent = `⌛️ ${formatRemainingTime(remaining)}`;
    reminderTimer.activeButton.style.setProperty('--timer-progress', `${progress * 100}%`);
  }

  if (remaining <= 0 && reminderTimer.pomodoroState === 'running') {
    finishReminderTimer();
  }
}

function updateTimerPhaseLabel() {
  if (!reminderTimer.activeButton) return;
  const phase = reminderTimer.activeButton.querySelector('.timer-option-phase');
  if (!phase) return;
  if (reminderTimer.pomodoroState === 'paused') {
    phase.textContent = '已暂停';
  } else if (reminderTimer.pomodoroPhase === 'restPending') {
    phase.textContent = '';
  } else if (reminderTimer.pomodoroPhase === 'rest') {
    phase.textContent = '休息中';
  } else {
    phase.textContent = '专注中';
  }
}

function resetTimerPanel() {
  timerDialog.classList.remove('timer-running', 'timer-paused', 'timer-menu-expanded');
  timerOptionButtons.forEach(button => {

    button.style.setProperty('--timer-progress', '0%');
    const countdown = button.querySelector('.timer-option-countdown');
    const phase = button.querySelector('.timer-option-phase');
    if (phase) phase.textContent = '专注中';
    if (countdown) {
      countdown.textContent = `⌛️ ${button.dataset.initialCountdown ?? `${button.dataset.focusMinutes}:00`}`;
    }
  });
  reminderTimer.activeButton = null;
}

function showCollapsedTimerPanel() {

function expandTimerMenu() {
  if (!['running', 'paused'].includes(reminderTimer.pomodoroState)) return;
  setDialogView('timer');
  timerDialog.classList.remove('timer-running', 'timer-paused');
  timerDialog.classList.add('timer-menu-expanded');
  syncTimerDialogAndPerch();
}

function pausePomodoroTimer() {
  if (reminderTimer.pomodoroState !== 'running' || reminderTimer.pomodoroPhase === 'restPending') return;
  reminderTimer.pomodoroState = 'paused';
  reminderTimer.pausedAt = Date.now();
  if (reminderTimer.timeout) clearTimeout(reminderTimer.timeout);
  if (reminderTimer.tickInterval) clearInterval(reminderTimer.tickInterval);
  reminderTimer.timeout = null;
  reminderTimer.tickInterval = null;
  updateReminderCountdown();
  updateTimerPhaseLabel();
  timerDialog.classList.add('timer-running', 'timer-paused');
  timerDialog.classList.remove('timer-menu-expanded');
  syncTimerDialogAndPerchAfterLayout();
}

function resumePomodoroTimer() {
  if (reminderTimer.pomodoroState !== 'paused') return;
  const pausedDuration = Date.now() - reminderTimer.pausedAt;
  reminderTimer.queue.forEach(item => {
    if (item.group === 'pomodoro') item.dueAt += pausedDuration;
  });
  reminderTimer.phaseStartedAt += pausedDuration;
  reminderTimer.phaseEndAt += pausedDuration;
  reminderTimer.pomodoroEndAt += pausedDuration;
  reminderTimer.pausedAt = 0;
  reminderTimer.pomodoroState = 'running';
  updateTimerPhaseLabel();
  timerDialog.classList.remove('timer-paused');
  scheduleNextReminder();
  reminderTimer.tickInterval = setInterval(updateReminderCountdown, 200);
  updateReminderCountdown();
  showCollapsedTimerPanel();
}

function syncTimerDialogAndPerch() {
  if (!reminderTimer.dialogOpen || pet.state !== 'dialogPerch') return;
  const perchPoint = positionTimerDialog();

  return {
    top: 12,
    right: 12,
    bottom: desktopMode ? 22 : 12,

  const showChat = view === 'chat';
  timerDialog.classList.toggle('chat-mode', showChat);
  chatView.hidden = !showChat;
  timerView.hidden = showChat;
  chatTab.classList.toggle('active', showChat);

  chatTab.setAttribute('aria-selected', String(showChat));

function renderChatMessages() {
  chatMessages.replaceChildren();
  if (chat.messages.length === 0 && !chat.pending) {
    const empty = document.createElement('div');
    empty.className = 'chat-empty';
    empty.innerHTML = '临时遇到知识问题就问我吧。<br>这次页面关闭后，我就不记得啦。';
    chatMessages.appendChild(empty);
    return;
  }

  chat.messages.forEach(message => {
    const bubble = document.createElement('div');
    bubble.className = `chat-message ${message.role}`;
    bubble.textContent = message.content;
    chatMessages.appendChild(bubble);
  });

  if (chat.pending) {
    const pending = document.createElement('div');
    pending.className = 'chat-message assistant pending';
    pending.textContent = 'Mango 正在想…';
    chatMessages.appendChild(pending);
  }
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function clearChat() {
  if (chat.controller) chat.controller.abort();
  chat.controller = null;
  chat.pending = false;
  chat.messages = [];
  syncTimerDialogAndPerchAfterLayout();
  chatForm.reset();
  if (chat.apiConfigured === false) {
    setChatApiConfigNeeded(true);
  } else {
    chatError.textContent = '';
  }
  renderChatMessages();
}

function setChatApiConfigNeeded(needed) {
  chat.apiConfigured = !needed;
  chatForm.classList.toggle('api-config', needed);
  chatForm.classList.toggle('provider-selected', !needed || chat.providerChosen);
  chatInput.placeholder = needed
    ? (chat.providerChosen ? '输入 API Key…' : '先选择服务商')
    : '问一个问题…';
  chatSend.disabled = chat.pending;
  if (needed) {
    chatError.textContent = chat.providerChosen ? '请输入 API Key。' : '请选择服务商。';
  } else if (chatError.textContent === '请输入 API Key 后再聊天。') {
    chatError.textContent = '';
  } else if (chatError.textContent === '请输入 API Key。') {
    chatError.textContent = '';
  } else if (chatError.textContent === '请选择服务商。') {
    chatError.textContent = '';
  }
  syncTimerDialogAndPerchAfterLayout();
}

function renderChatProviders(providers, currentProvider) {
  if (currentProvider && Array.isArray(providers) &&
      providers.some(provider => provider.id === currentProvider)) {
    chat.provider = currentProvider;
  }
}

function isStrongApiReconfigurationRequest(text) {
  return /(新|新的|有新|我有新).{0,8}(api|key|密钥)|(改|换|重设|重新|更新|修改|配置|设置).{0,8}(api|key|密钥)|(?:api|key|密钥).{0,8}(改|换|重设|重新|更新|修改|配置|设置)/i.test(text);
}

function isPossibleApiReconfigurationRequest(text) {
  return isStrongApiReconfigurationRequest(text) ||
    /(改|换|重设|重新|更新|修改|配置|设置).{0,8}(服务商|模型服务)|(?:服务商|模型服务).{0,8}(改|换|重设|重新|更新|修改|配置|设置)|换.{0,8}(服务|模型|供应商|平台)/i.test(text);
}

function beginChatApiReconfiguration() {
  if (chat.controller) chat.controller.abort();
  chat.controller = null;
  chat.pending = false;
  chat.apiConfigured = false;
  chat.providerChosen = false;
  chat.reconfigPending = false;
  chatInput.value = '';
  setChatApiConfigNeeded(true);
  renderChatMessages();
  chatInput.focus();
}

function requestChatApiReconfigurationConfirmation() {
  chat.reconfigPending = true;
  chatInput.value = '';
  chatError.textContent = '要重新配置 API 吗？再次发送“确认更换”。';
  syncTimerDialogAndPerchAfterLayout();
  chatInput.focus();
}

async function checkChatApiConfig() {
  if (!desktopMode) return true;
  try {
    const response = await fetch('/api/health');
    const result = await response.json().catch(() => ({}));
    chat.apiConfigured = Boolean(result.configured);
    if (!chat.apiConfigured) {
      chat.providerChosen = false;
    }
    renderChatProviders(result.providers, result.provider);
  } catch {
    chat.apiConfigured = true;
    return true;
  }
  setChatApiConfigNeeded(!chat.apiConfigured);
  return chat.apiConfigured;
}

async function saveChatApiKey(apiKey) {
  apiKey = apiKey.trim();
  if (!apiKey) {
    chatError.textContent = '请输入 API Key。';
    chatInput.focus();
    return;
  }
  chat.pending = true;
  chatSend.disabled = true;
  chatError.textContent = '正在保存 API Key…';
  try {
    const response = await fetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        provider: chat.provider,
        apiKey
      })
    });
    const result = await response.json().catch(() => ({}));
    if (!response.ok) {
      throw new Error(result.error || '保存 API Key 失败。');
    }
    chat.apiConfigured = true;
    chat.provider = result.provider || chat.provider;
    chat.providerChosen = false;
    chatInput.value = '';
    setChatApiConfigNeeded(false);
    chatError.textContent = 'API Key 已保存，可以问 Mango 了。';
    chatInput.focus();
  } catch (error) {
    chatError.textContent = error.message || '保存 API Key 失败。';
    chatInput.focus();
  } finally {
    chat.pending = false;
    chatSend.disabled = false;
    syncTimerDialogAndPerchAfterLayout();
  }
}

async function askBird(question) {
  if (chat.pending) return;
  if (desktopMode && chat.apiConfigured !== true) {
    const configured = await checkChatApiConfig();
    if (!configured) return;
  }
  chat.messages.push({ role: 'user', content: question });
  chat.messages = chat.messages.slice(-12);
  chat.pending = true;
  chatError.textContent = '';
  syncTimerDialogAndPerchAfterLayout();
  chatSend.disabled = true;
  renderChatMessages();

  const controller = new AbortController();
  chat.controller = controller;
  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: chat.messages,
        mode: 'fast'
      }),
      signal: controller.signal
    });
    const result = await response.json().catch(() => ({}));
    if (!response.ok) {
      throw new Error(result.error || '暂时没有收到回答，请稍后再试。');
    }
    chat.messages.push({ role: 'assistant', content: result.message });
    chat.messages = chat.messages.slice(-12);
  } catch (error) {
    if (error.name !== 'AbortError') {
      chatError.textContent = error.message === 'Failed to fetch'
        ? '聊天服务未启动，请使用 mango-bird-server.py 打开页面。'
        : error.message;
      if (desktopMode && /API Key|尚未设置/.test(chatError.textContent)) {
        setChatApiConfigNeeded(true);
      }
      syncTimerDialogAndPerchAfterLayout();
    }
  } finally {
    if (chat.controller === controller) chat.controller = null;
    chat.pending = false;
    chatSend.disabled = false;
    renderChatMessages();
    syncTimerDialogAndPerchAfterLayout();
    chatInput.focus();
  }
}

function makeCuteReminderText(eventName, randomValue = Math.random()) {
  const reminderEmojis = ['💧', '🌿', '☀️', '✨', '🍵', '🌼'];
  const emojiIndex = Math.min(
    reminderEmojis.length - 1,
    Math.floor(Math.max(0, randomValue * 1.73 % 1) * reminderEmojis.length)
  );
  const emoji = randomValue < 0.42 ? ` ${reminderEmojis[emojiIndex]}` : '';
  if (/(喝水|饮水|补水)/.test(eventName)) {
    return `啾～该喝水啦${emoji}`;
  }
  const templates = [
    event => `该${event}啦～`,
    event => `${event}时间到啦～`,
    event => `啾～该${event}啦`
  ];
  const index = Math.min(
    templates.length - 1,
    Math.floor(Math.max(0, randomValue) * templates.length)
  );
  return `${templates[index](eventName)}${emoji}`;
}

function finishReminderTimer() {
  if (!reminderTimer.active || reminderTimer.queue.length === 0) return;
  const nextReminder = reminderTimer.queue[0];
  if (nextReminder.dueAt > Date.now()) {
    scheduleNextReminder();
    return;
  }
  reminderTimer.queue.shift();

  if (reminderTimer.timeout) clearTimeout(reminderTimer.timeout);
  reminderTimer.timeout = null;
  reminderTimer.active = reminderTimer.queue.length > 0;
  if (nextReminder.type === 'focusEnd') {
    showReminderPop('该休息啦～', 'custom', 5000);
    reminderTimer.pomodoroPhase = 'restPending';
    updateTimerPhaseLabel();
    reminderTimer.phaseStartedAt = Date.now();
    reminderTimer.phaseDuration = 5000;
    reminderTimer.phaseEndAt = reminderTimer.phaseStartedAt + 5000;
    if (reminderTimer.activeButton) {
      const countdown = reminderTimer.activeButton.querySelector('.timer-option-countdown');
      if (countdown) countdown.textContent = '⌛️ 0:00';
      reminderTimer.activeButton.style.setProperty('--timer-progress', '100%');
    }
    if (reminderTimer.tickInterval) clearInterval(reminderTimer.tickInterval);
    reminderTimer.tickInterval = null;
    reminderTimer.timeout = setTimeout(() => {
      reminderTimer.timeout = null;
      if (reminderTimer.pomodoroPhase !== 'restPending') return;
      const restStartedAt = Date.now();
      reminderTimer.pomodoroPhase = 'rest';
      updateTimerPhaseLabel();
      reminderTimer.phaseStartedAt = restStartedAt;
      reminderTimer.phaseDuration = nextReminder.restMs;
      reminderTimer.phaseEndAt = restStartedAt + nextReminder.restMs;
      const cycleEndReminder = reminderTimer.queue.find(item => item.type === 'cycleEnd');
      if (cycleEndReminder) cycleEndReminder.dueAt = reminderTimer.phaseEndAt;
      if (reminderTimer.activeButton) {
        reminderTimer.activeButton.style.setProperty('--timer-progress', '0%');
      }
      reminderTimer.tickInterval = setInterval(updateReminderCountdown, 200);
      updateReminderCountdown();
      if (reminderTimer.active) scheduleNextReminder();
    }, 5000);
    return;
  }

  if (nextReminder.type === 'cycleEnd') {
    if (reminderTimer.tickInterval) clearInterval(reminderTimer.tickInterval);
    reminderTimer.tickInterval = null;
    reminderTimer.pomodoroState = 'ready';
    reminderTimer.pomodoroEndAt = 0;
    reminderTimer.pomodoroStartedAt = 0;
    reminderTimer.pomodoroDuration = 0;
    reminderTimer.pomodoroPhase = 'focus';
    reminderTimer.phaseStartedAt = 0;
    reminderTimer.phaseEndAt = 0;
    reminderTimer.phaseDuration = 0;
    reminderTimer.pausedAt = 0;
    reminderTimer.completedHalves += nextReminder.tomatoHalves;
    renderTomatoProgress();
    timerBadge.hidden = true;
    resetTimerPanel();
    timerDialog.hidden = false;
    reminderTimer.dialogOpen = true;
    syncTimerDialogAndPerch();
  }
  if (reminderTimer.active) scheduleNextReminder();
  handleReminderEvent(nextReminder);
}

function scheduleNextReminder() {
  if (reminderTimer.timeout) clearTimeout(reminderTimer.timeout);
  const nextReminder = reminderTimer.queue[0];
  if (!nextReminder) return;
  reminderTimer.timeout = setTimeout(
    finishReminderTimer,
    Math.max(0, nextReminder.dueAt - Date.now())
  );
}

function refreshReminderSchedule() {
  reminderTimer.queue.sort((a, b) => a.dueAt - b.dueAt);
  reminderTimer.active = reminderTimer.queue.length > 0;
  if (!reminderTimer.active) return;
  scheduleNextReminder();
}

function formatMemoTime(timestamp) {
  const date = new Date(timestamp);
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const targetStart = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const dayDiff = Math.round((targetStart - todayStart) / 86400000);
  const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  let dateText;

  if (dayDiff === 0) dateText = '今天';
  else if (dayDiff === 1) dateText = '明天';
  else if (dayDiff === 2) dateText = '后天';
  else if (dayDiff > 2 && dayDiff <= 7) dateText = weekdays[date.getDay()];
  else {
    dateText = date.getFullYear() === now.getFullYear()
      ? `${date.getMonth() + 1}月${date.getDate()}日`
      : `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
  }

  const hour = date.getHours();
  const minute = date.getMinutes();
  const period = hour < 6 ? '凌晨'
    : hour < 9 ? '早上'
      : hour < 12 ? '上午'
        : hour === 12 ? '中午'
          : hour < 18 ? '下午'
            : '晚上';
  const displayHour = hour > 12 ? hour - 12 : hour;
  const minuteText = minute ? `${String(minute).padStart(2, '0')}分` : '';
  return `${dateText}${period}${displayHour}点${minuteText}`;
}

function removeQueuedMemoReminder(memoId) {
  reminderTimer.queue = reminderTimer.queue.filter(item => item.memoId !== memoId);
  if (reminderTimer.timeout) clearTimeout(reminderTimer.timeout);
  reminderTimer.timeout = null;
  if (reminderTimer.queue.length === 0) {
    reminderTimer.active = false;
  } else {
    refreshReminderSchedule();
  }
}

function renderReminderMemos() {
  memoList.replaceChildren();
  reminderMemos.forEach(memo => {
    const item = document.createElement('div');
    item.className = `memo-item${memo.done ? ' done' : ''}`;

    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.className = 'memo-check';
    checkbox.checked = memo.done;
    checkbox.setAttribute('aria-label', `完成：${memo.message}`);
    checkbox.addEventListener('change', () => {
      memo.done = checkbox.checked;
      if (memo.done && !memo.triggered) removeQueuedMemoReminder(memo.id);
      renderReminderMemos();
    });

    const content = document.createElement('div');
    const text = document.createElement('span');
    text.className = 'memo-text';
    text.textContent = memo.message;
    content.append(text);
    if (Number.isFinite(memo.dueAt)) {
      const time = document.createElement('span');
      time.className = 'memo-time';
      time.textContent = formatMemoTime(memo.dueAt);
      content.append(time);
    }

    const remove = document.createElement('button');
    remove.type = 'button';
    remove.className = 'memo-delete';
    remove.textContent = '×';
    remove.setAttribute('aria-label', `删除：${memo.message}`);
    remove.addEventListener('click', () => {
      const index = reminderMemos.findIndex(entry => entry.id === memo.id);
      if (index >= 0) reminderMemos.splice(index, 1);
      if (!memo.triggered) removeQueuedMemoReminder(memo.id);
      renderReminderMemos();
    });

    item.append(checkbox, content, remove);
    memoList.appendChild(item);
  });
}

function startReminderTimer(option) {
  const focusMs = option.focusMs ?? option.focusMinutes * 60 * 1000;
  const restMs = option.restMs ?? option.restMinutes * 60 * 1000;
  if (!Number.isFinite(focusMs) || focusMs <= 0 || !Number.isFinite(restMs) || restMs <= 0) return;
  const focusMinutes = option.focusMinutes ?? Math.round(focusMs / 60000);
  const restMinutes = option.restMinutes ?? Math.round(restMs / 60000);

  removeReminderGroup('pomodoro');
  reminderTimer.currentOption = { ...option, focusMs, restMs, focusMinutes, restMinutes };
  reminderTimer.pomodoroState = 'running';
  const startedAt = Date.now();
  reminderTimer.pomodoroEndAt = startedAt + focusMs;
  reminderTimer.pomodoroStartedAt = startedAt;
  reminderTimer.pomodoroDuration = focusMs;
  reminderTimer.pomodoroPhase = 'focus';
  reminderTimer.phaseStartedAt = startedAt;
  reminderTimer.phaseEndAt = startedAt + focusMs;
  reminderTimer.phaseDuration = focusMs;
  reminderTimer.pausedAt = 0;
  reminderTimer.activeButton = option.button || null;
  setDialogView('timer');
  updateTimerPhaseLabel();
  reminderTimer.queue.push(
    {
      group: 'pomodoro',
      type: 'focusEnd',
      label: `${focusMinutes}/${restMinutes} 专注结束`,
      message: '',
      focusMinutes,
      restMinutes,
      displayLabel: option.displayLabel ?? `${focusMinutes}/${restMinutes}`,
      tomatoHalves: option.tomatoHalves ?? (focusMinutes >= 60 ? 2 : 1),
      restMs,
      dueAt: startedAt + focusMs
    },
    {
      group: 'pomodoro',
      type: 'cycleEnd',
      label: `${focusMinutes}/${restMinutes} 周期结束`,
      message: '',
      displayLabel: option.displayLabel ?? `${focusMinutes}/${restMinutes}`,
      tomatoHalves: option.tomatoHalves ?? (focusMinutes >= 60 ? 2 : 1),
      dueAt: startedAt + focusMs + restMs
    }
  );
  timerDialog.classList.add('timer-running');
  timerDialog.classList.remove('timer-paused', 'timer-menu-expanded');
  timerOptionButtons.forEach(button => {
    button.classList.toggle('active-timer', button === reminderTimer.activeButton);
  });
  timerBadge.hidden = true;
  updateReminderCountdown();
  if (reminderTimer.tickInterval) clearInterval(reminderTimer.tickInterval);
  reminderTimer.tickInterval = setInterval(updateReminderCountdown, 200);
  refreshReminderSchedule();
  requestReminderNotificationPermission();
  syncTimerDialogAndPerch();
}

function animateBirdPosition(target, options = {}) {
  cancelBirdPositionAnimation();
  const start = { x: pet.x, y: pet.y };
  const duration = options.duration ?? 520;
  const jumpHeight = options.jumpHeight ?? 58;
  const startScale = options.startScale ?? 1;
  const endScale = options.endScale ?? 1;
  const middleScale = Math.max(startScale, endScale) + 0.05;
  const startTransform = `translate(-50%, -50%) translate3d(${start.x}px, ${start.y}px, 0) scale(${startScale})`;
  const middleTransform = `translate(-50%, -50%) translate3d(${(start.x + target.x) / 2}px, ${(start.y + target.y) / 2 - jumpHeight}px, 0) scale(${middleScale})`;
  const endTransform = `translate(-50%, -50%) translate3d(${target.x}px, ${target.y}px, 0) scale(${endScale})`;

  const animation = birdWrap.animate(
    [
      { transform: startTransform, offset: 0 },
      { transform: middleTransform, offset: 0.5 },
      { transform: endTransform, offset: 1 }
    ],
    {
      duration,
      easing: 'cubic-bezier(0.3, 0.75, 0.25, 1)',
      fill: 'forwards'
    }
  );
  pet.positionAnimation = animation;

  animation.onfinish = () => {
    animation.commitStyles?.();
    pet.x = target.x;
    pet.y = target.y;
    animation.cancel();
    pet.positionAnimation = null;
    renderBird({ scale: endScale });
    options.done?.();
  };
}
