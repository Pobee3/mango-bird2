  perchMotionTimer: null,
  perchFrameTimer: null,
  perchTiltTimer: null
};

const weather = {
  loading: false,
  loaded: false,
  fetchedAt: 0,
  visual: null,
  temperature: null,
  description: '',
  pendingBubble: false,
  bubbleTimer: null,
  burstTimer: null
};

const reminderTimer = {
  active: false,
  dialogOpen: false,
  queue: [],
  timeout: null,
  tickInterval: null,
  popTimer: null,
  currentOption: null,
  pomodoroState: 'idle',
  pomodoroEndAt: 0,
  pomodoroStartedAt: 0,
  pomodoroDuration: 0,
  pomodoroPhase: 'focus',
  phaseStartedAt: 0,
  phaseEndAt: 0,
  phaseDuration: 0,
  pausedAt: 0,
  progressFrame: null,
  activeButton: null,
  completedHalves: 0,
  dialogPosition: null,
  dialogDrag: null
};

const reminderMemos = [];

function clearPetTimers() {
  pet.timers.forEach(timer => clearTimeout(timer));
  pet.timers.clear();
}

function later(callback, delay) {
  const timer = setTimeout(() => {
    pet.timers.delete(timer);
    callback();
  }, delay);
  pet.timers.add(timer);
  return timer;
}

function setPetState(nextState) {
  if (pet.state === 'dialogPerch' && nextState !== 'dialogPerch') {
    clearPerchIdleMotion();
  }
  pet.state = nextState;
  birdWrap.className = `bird-wrap ${nextState}`;
  birdWrap.classList.toggle('ready', pet.ready);
  birdWrap.classList.toggle('has-frames', hasFrameSet(nextState));
  shadow.classList.toggle('perch-hidden', nextState === 'dialogPerch');
}

function clearPerchIdleMotion() {
  if (pet.perchMotionTimer) clearTimeout(pet.perchMotionTimer);
  if (pet.perchFrameTimer) clearTimeout(pet.perchFrameTimer);
  if (pet.perchTiltTimer) clearTimeout(pet.perchTiltTimer);
  pet.perchMotionTimer = null;
  pet.perchFrameTimer = null;
  pet.perchTiltTimer = null;
  birdWrap.classList.remove('perch-tilt');
  if (pet.state === 'dialogPerch') restoreDefaultBirdImage();
}

function schedulePerchIdleMotion() {
  if (pet.perchMotionTimer) clearTimeout(pet.perchMotionTimer);
  if (pet.perchTiltTimer) clearTimeout(pet.perchTiltTimer);
  if (!reminderTimer.dialogOpen || pet.state !== 'dialogPerch') return;
  pet.perchMotionTimer = setTimeout(
    playPerchBlink,
    20000
  );
  pet.perchTiltTimer = setTimeout(playPerchTilt, 20000);
}

function playPerchBlink() {
  pet.perchMotionTimer = null;
  if (!reminderTimer.dialogOpen || pet.state !== 'dialogPerch') return;

  const blinkFrames = (loadedFrames.headBlink || []).filter(Boolean);
  if (blinkFrames.length >= 4) {
    const sequence = [0, 1, 2, 3, 2, 1, 0];
    let index = 0;
    const step = () => {
      if (!reminderTimer.dialogOpen || pet.state !== 'dialogPerch') return;
      birdImg.src = blinkFrames[Math.min(sequence[index], blinkFrames.length - 1)];
      index += 1;
      if (index < sequence.length) {
        pet.perchFrameTimer = setTimeout(step, 150);
      } else {
        pet.perchFrameTimer = setTimeout(() => {
          pet.perchFrameTimer = null;
          restoreDefaultBirdImage();
          pet.perchMotionTimer = setTimeout(
            playPerchBlink,
            20000
          );
        }, 150);
      }
    };
    step();
    return;
  }
  pet.perchMotionTimer = setTimeout(playPerchBlink, 20000);
}

function playPerchTilt() {
  pet.perchTiltTimer = null;
  if (!reminderTimer.dialogOpen || pet.state !== 'dialogPerch') return;
  birdWrap.classList.remove('perch-tilt');
  void birdWrap.offsetWidth;
  birdWrap.classList.add('perch-tilt');
  pet.perchTiltTimer = setTimeout(() => {
    birdWrap.classList.remove('perch-tilt');
    pet.perchTiltTimer = setTimeout(playPerchTilt, 18800);
  }, 1200);
}

function isReminderUiOpen() {
  return reminderTimer.dialogOpen;
}

function formatRemainingTime(milliseconds) {
  const totalSeconds = Math.max(0, Math.ceil(milliseconds / 1000));
  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;
  const minuteText = hours > 0
    ? String(minutes).padStart(2, '0')
    : String(minutes);
  return `${hours > 0 ? `${hours}:` : ''}${minuteText}:${String(seconds).padStart(2, '0')}`;
}

function updateReminderCountdown() {
  if (!['running', 'paused'].includes(reminderTimer.pomodoroState)) return;
  const now = reminderTimer.pomodoroState === 'paused'
    ? reminderTimer.pausedAt
    : Date.now();
  const remaining = reminderTimer.phaseEndAt - now;
  const progress = clamp(
    (now - reminderTimer.phaseStartedAt) / reminderTimer.phaseDuration,
    0,
    1
  );

  if (reminderTimer.activeButton) {
    const countdown = reminderTimer.activeButton.querySelector('.timer-option-countdown');
    if (countdown) countdown.textContent = `⌛️ ${formatRemainingTime(remaining)}`;
    reminderTimer.activeButton.style.setProperty('--timer-progress', `${progress * 100}%`);
  }

  if (remaining <= 0 && reminderTimer.pomodoroState === 'running') {
    finishReminderTimer();
  }
}

function resetTimerPanel() {
  timerDialog.classList.remove('timer-running', 'timer-paused', 'timer-menu-expanded');
  timerOptionButtons.forEach(button => {
    button.classList.remove('active-timer');
    button.style.setProperty('--timer-progress', '0%');
    const countdown = button.querySelector('.timer-option-countdown');
    if (countdown) {
      countdown.textContent = `⌛️ ${button.dataset.initialCountdown ?? `${button.dataset.focusMinutes}:00`}`;
    }
  });
  reminderTimer.activeButton = null;
}

function showCollapsedTimerPanel() {
  timerDialog.classList.add('timer-running');
  timerDialog.classList.remove('timer-menu-expanded');
  syncTimerDialogAndPerch();
}

function expandTimerMenu() {
  if (!['running', 'paused'].includes(reminderTimer.pomodoroState)) return;
  timerDialog.classList.remove('timer-running', 'timer-paused');
  timerDialog.classList.add('timer-menu-expanded');
  syncTimerDialogAndPerch();
}

function pausePomodoroTimer() {
  if (reminderTimer.pomodoroState !== 'running' || reminderTimer.pomodoroPhase === 'restPending') return;
  reminderTimer.pomodoroState = 'paused';
  reminderTimer.pausedAt = Date.now();
  if (reminderTimer.timeout) clearTimeout(reminderTimer.timeout);
  if (reminderTimer.tickInterval) clearInterval(reminderTimer.tickInterval);
  reminderTimer.timeout = null;
  reminderTimer.tickInterval = null;
  updateReminderCountdown();
  timerDialog.classList.add('timer-running', 'timer-paused');
  timerDialog.classList.remove('timer-menu-expanded');
  syncTimerDialogAndPerch();
}

function resumePomodoroTimer() {
  if (reminderTimer.pomodoroState !== 'paused') return;
  const pausedDuration = Date.now() - reminderTimer.pausedAt;
  reminderTimer.queue.forEach(item => {
    if (item.group === 'pomodoro') item.dueAt += pausedDuration;
  });
  reminderTimer.phaseStartedAt += pausedDuration;
  reminderTimer.phaseEndAt += pausedDuration;
  reminderTimer.pomodoroEndAt += pausedDuration;
  reminderTimer.pausedAt = 0;
  reminderTimer.pomodoroState = 'running';
  timerDialog.classList.remove('timer-paused');
  scheduleNextReminder();
  reminderTimer.tickInterval = setInterval(updateReminderCountdown, 200);
  updateReminderCountdown();
  showCollapsedTimerPanel();
}

function syncTimerDialogAndPerch() {
  if (!reminderTimer.dialogOpen || pet.state !== 'dialogPerch') return;
  const perchPoint = positionTimerDialog();
  pet.x = perchPoint.x;
  pet.y = perchPoint.y;
  renderBird({ scale: 0.65 });
}

function updateDraggedTimerDialog(clientX, clientY) {
  const drag = reminderTimer.dialogDrag;
  if (!drag) return;
  const margin = 12;
  const left = clamp(
    clientX - drag.offsetX,
    margin,
    window.innerWidth - timerDialog.offsetWidth - margin
  );
  const top = clamp(
    clientY - drag.offsetY,
    margin,
    window.innerHeight - timerDialog.offsetHeight - margin
  );
  reminderTimer.dialogPosition = { left, top };
  timerDialog.style.left = `${left}px`;
  timerDialog.style.top = `${top}px`;
  const perchPoint = getTimerDialogPerchPoint(left, top);
  pet.x = perchPoint.x;
  pet.y = perchPoint.y;
  renderBird({ scale: 0.65 });
}

function clearReminderTimer(options = {}) {
  if (reminderTimer.timeout) clearTimeout(reminderTimer.timeout);
  if (reminderTimer.tickInterval) clearInterval(reminderTimer.tickInterval);
  if (reminderTimer.popTimer) clearTimeout(reminderTimer.popTimer);
  reminderTimer.timeout = null;
  reminderTimer.tickInterval = null;
  reminderTimer.popTimer = null;
  reminderTimer.active = false;
  reminderTimer.queue = [];
  reminderTimer.currentOption = null;
  reminderTimer.pomodoroState = 'idle';
  reminderTimer.pomodoroEndAt = 0;
  reminderTimer.pomodoroStartedAt = 0;
  reminderTimer.pomodoroDuration = 0;
  reminderTimer.pomodoroPhase = 'focus';
  reminderTimer.phaseStartedAt = 0;
  reminderTimer.phaseEndAt = 0;
  reminderTimer.phaseDuration = 0;
  reminderTimer.pausedAt = 0;
  resetTimerPanel();
  reminderTimer.completedHalves = 0;
  timerBadge.hidden = true;
  renderTomatoProgress();
  reminderPop.className = 'reminder-pop';
  reminderPop.textContent = '';
}

function requestReminderNotificationPermission() {
  if (!('Notification' in window) || Notification.permission !== 'default') return;
  Notification.requestPermission().catch(() => {});
}

function sendReminderNotification(item) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;

  try {
    new Notification('芒果小鸟提醒你', {
      body: item.message,
      icon: new URL(defaultBirdSrc, window.location.href).href
    });
  } catch {
    // The in-page reminder remains available when system notifications fail.
  }
}

const customReminderPopDuration = 5000;

function makeCuteReminderText(eventName, randomValue = Math.random()) {
  const templates = [
    event => `啾啾，到时间啦～ ${event}`,
    event => `小鸟来报时啦～ 记得${event}`,
    event => `轻轻提醒一下～ 该${event}啦`,
    event => `叮咚～ ${event}时间到`,
    event => `芒果小鸟说：别忘了${event}呀～`
  ];
  const index = Math.min(
    templates.length - 1,
    Math.floor(Math.max(0, randomValue) * templates.length)
  );
  return templates[index](eventName);
}

function showReminderPop(content, type = 'custom', duration = customReminderPopDuration) {
  if (reminderTimer.popTimer) clearTimeout(reminderTimer.popTimer);
  clearWeatherBubbleTimers();
  weatherBubble.className = 'weather-bubble';
  weatherBubbleHit.className = 'weather-bubble-hit';
  reminderPop.className = `reminder-pop ${type}`;
  reminderPop.textContent = content;
  requestAnimationFrame(() => reminderPop.classList.add('visible'));
  reminderTimer.popTimer = setTimeout(() => {
    reminderPop.classList.add('hiding');
    reminderTimer.popTimer = setTimeout(() => {
      reminderTimer.popTimer = null;
      reminderPop.className = 'reminder-pop';
      reminderPop.textContent = '';
    }, 300);
  }, duration);
}

function jumpBirdThreeTimes() {
  const startJump = () => {
    beginPetInteraction();
    if (pet.state !== 'idle') {
      clearPetTimers();
      stopMotionLoops();
      returnToIdle({ resetInactivity: false });
    }
    birdWrap.classList.remove('activity-jump');
    void birdWrap.offsetWidth;
    birdWrap.classList.add('activity-jump');
    setTimeout(() => {
      birdWrap.classList.remove('activity-jump');
      renderBird({ scale: 1 });
      scheduleHeadBlink();
    }, 1950);
  };

  if (pet.state === 'sleeping') {
    wakeFromSleep();
    setTimeout(startJump, frameSets.waking.length * config.ruffleFrameDuration + 120);
  } else {
    startJump();
  }
}

function handleReminderEvent(item) {
  if (item.type === 'custom') {
    showReminderPop(
      makeCuteReminderText(item.message),
      'custom',
      customReminderPopDuration
    );
    const memo = reminderMemos.find(entry => entry.id === item.memoId);
    if (memo) {
      memo.triggered = true;
      renderReminderMemos();
    }
    document.title = `提醒：${item.label}`;
    sendReminderNotification(item);
    setTimeout(() => {
      if (document.title.startsWith('提醒：')) document.title = defaultDocumentTitle;
    }, 5000);
  }
}

function finishReminderTimer() {
  if (!reminderTimer.active || reminderTimer.queue.length === 0) return;
  const nextReminder = reminderTimer.queue[0];
  if (nextReminder.dueAt > Date.now()) {
    scheduleNextReminder();
    return;
  }
  reminderTimer.queue.shift();

  if (reminderTimer.timeout) clearTimeout(reminderTimer.timeout);
  reminderTimer.timeout = null;
  reminderTimer.active = reminderTimer.queue.length > 0;
  if (nextReminder.type === 'focusEnd') {
    showReminderPop('该休息啦～', 'custom', 3000);
    reminderTimer.pomodoroPhase = 'restPending';
    reminderTimer.phaseStartedAt = Date.now();
    reminderTimer.phaseDuration = 3000;
    reminderTimer.phaseEndAt = reminderTimer.phaseStartedAt + 3000;
    if (reminderTimer.activeButton) {
      const countdown = reminderTimer.activeButton.querySelector('.timer-option-countdown');
      if (countdown) countdown.textContent = '⌛️ 0:00';
      reminderTimer.activeButton.style.setProperty('--timer-progress', '100%');
    }
    if (reminderTimer.tickInterval) clearInterval(reminderTimer.tickInterval);
    reminderTimer.tickInterval = null;
    reminderTimer.timeout = setTimeout(() => {
      reminderTimer.timeout = null;
      if (reminderTimer.pomodoroPhase !== 'restPending') return;
      const restStartedAt = Date.now();
      reminderTimer.pomodoroPhase = 'rest';
      reminderTimer.phaseStartedAt = restStartedAt;
      reminderTimer.phaseDuration = nextReminder.restMs;
      reminderTimer.phaseEndAt = restStartedAt + nextReminder.restMs;
      const cycleEndReminder = reminderTimer.queue.find(item => item.type === 'cycleEnd');
      if (cycleEndReminder) cycleEndReminder.dueAt = reminderTimer.phaseEndAt;
      if (reminderTimer.activeButton) {
        reminderTimer.activeButton.style.setProperty('--timer-progress', '0%');
      }
      reminderTimer.tickInterval = setInterval(updateReminderCountdown, 200);
      updateReminderCountdown();
      if (reminderTimer.active) scheduleNextReminder();
    }, 3000);
    return;
  }

  if (nextReminder.type === 'cycleEnd') {
    if (reminderTimer.tickInterval) clearInterval(reminderTimer.tickInterval);
    reminderTimer.tickInterval = null;
    reminderTimer.pomodoroState = 'ready';
    reminderTimer.pomodoroEndAt = 0;
    reminderTimer.pomodoroStartedAt = 0;
    reminderTimer.pomodoroDuration = 0;
    reminderTimer.pomodoroPhase = 'focus';
    reminderTimer.phaseStartedAt = 0;
    reminderTimer.phaseEndAt = 0;
    reminderTimer.phaseDuration = 0;
    reminderTimer.pausedAt = 0;
    reminderTimer.completedHalves += nextReminder.tomatoHalves;
    renderTomatoProgress();
    timerBadge.hidden = true;
    resetTimerPanel();
    timerDialog.hidden = false;
    reminderTimer.dialogOpen = true;
    syncTimerDialogAndPerch();
  }
  if (reminderTimer.active) scheduleNextReminder();
  handleReminderEvent(nextReminder);
}

function scheduleNextReminder() {
  if (reminderTimer.timeout) clearTimeout(reminderTimer.timeout);
  const nextReminder = reminderTimer.queue[0];
  if (!nextReminder) return;
  reminderTimer.timeout = setTimeout(
    finishReminderTimer,
    Math.max(0, nextReminder.dueAt - Date.now())
  );
}

function refreshReminderSchedule() {
  reminderTimer.queue.sort((a, b) => a.dueAt - b.dueAt);
  reminderTimer.active = reminderTimer.queue.length > 0;
  if (!reminderTimer.active) return;
  scheduleNextReminder();
}

function formatMemoTime(timestamp) {
  const date = new Date(timestamp);
  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const targetStart = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const dayDiff = Math.round((targetStart - todayStart) / 86400000);
  const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  let dateText;

  if (dayDiff === 0) dateText = '今天';
  else if (dayDiff === 1) dateText = '明天';
  else if (dayDiff === 2) dateText = '后天';
  else if (dayDiff > 2 && dayDiff <= 7) dateText = weekdays[date.getDay()];
  else {
    dateText = date.getFullYear() === now.getFullYear()
      ? `${date.getMonth() + 1}月${date.getDate()}日`
      : `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
  }

  const hour = date.getHours();
  const minute = date.getMinutes();
  const period = hour < 6 ? '凌晨'
    : hour < 9 ? '早上'
      : hour < 12 ? '上午'
        : hour === 12 ? '中午'
          : hour < 18 ? '下午'
            : '晚上';
  const displayHour = hour > 12 ? hour - 12 : hour;
  const minuteText = minute ? `${String(minute).padStart(2, '0')}分` : '';
  return `${dateText}${period}${displayHour}点${minuteText}`;
}

function removeQueuedMemoReminder(memoId) {
  reminderTimer.queue = reminderTimer.queue.filter(item => item.memoId !== memoId);
  if (reminderTimer.timeout) clearTimeout(reminderTimer.timeout);
  reminderTimer.timeout = null;
  if (reminderTimer.queue.length === 0) {
    reminderTimer.active = false;
  } else {
    refreshReminderSchedule();
  }
}

function renderReminderMemos() {
  memoList.replaceChildren();
  reminderMemos.forEach(memo => {
    const item = document.createElement('div');
    item.className = `memo-item${memo.done ? ' done' : ''}`;

    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.className = 'memo-check';
    checkbox.checked = memo.done;
    checkbox.setAttribute('aria-label', `完成：${memo.message}`);
    checkbox.addEventListener('change', () => {
      memo.done = checkbox.checked;
      if (memo.done && !memo.triggered) removeQueuedMemoReminder(memo.id);
      renderReminderMemos();
    });

    const content = document.createElement('div');
    const text = document.createElement('span');
    text.className = 'memo-text';
    text.textContent = memo.message;
    content.append(text);
    if (Number.isFinite(memo.dueAt)) {
      const time = document.createElement('span');
      time.className = 'memo-time';
      time.textContent = formatMemoTime(memo.dueAt);
      content.append(time);
    }

    const remove = document.createElement('button');
    remove.type = 'button';
    remove.className = 'memo-delete';
    remove.textContent = '×';
    remove.setAttribute('aria-label', `删除：${memo.message}`);
    remove.addEventListener('click', () => {
      const index = reminderMemos.findIndex(entry => entry.id === memo.id);
      if (index >= 0) reminderMemos.splice(index, 1);
      if (!memo.triggered) removeQueuedMemoReminder(memo.id);
      renderReminderMemos();
    });

    item.append(checkbox, content, remove);
    memoList.appendChild(item);
  });
}

function removeReminderGroup(group) {
  reminderTimer.queue = reminderTimer.queue.filter(item => item.group !== group);
}

function renderTomatoProgress() {
  tomatoProgress.replaceChildren();
  const fullTomatoes = Math.floor(reminderTimer.completedHalves / 2);
  const hasHalf = reminderTimer.completedHalves % 2 === 1;

  for (let index = 0; index < fullTomatoes; index += 1) {
    const tomato = document.createElement('span');
    tomato.className = 'tomato-mark';
    tomato.textContent = '🍅';
    tomatoProgress.appendChild(tomato);
  }
  if (hasHalf) {
    const tomato = document.createElement('span');
    tomato.className = 'tomato-mark half';
    tomato.textContent = '🍅';
    tomatoProgress.appendChild(tomato);
  }
  tomatoProgress.setAttribute('aria-label', `已完成 ${reminderTimer.completedHalves / 2} 个番茄钟`);
}

function stopPomodoroTimer() {
  removeReminderGroup('pomodoro');
  if (reminderTimer.timeout) clearTimeout(reminderTimer.timeout);
  if (reminderTimer.tickInterval) clearInterval(reminderTimer.tickInterval);
  reminderTimer.timeout = null;
  reminderTimer.tickInterval = null;
  reminderTimer.pomodoroState = 'idle';
  reminderTimer.pomodoroEndAt = 0;
  reminderTimer.pomodoroStartedAt = 0;
  reminderTimer.pomodoroDuration = 0;
  reminderTimer.pomodoroPhase = 'focus';
  reminderTimer.phaseStartedAt = 0;
  reminderTimer.phaseEndAt = 0;
  reminderTimer.phaseDuration = 0;
  reminderTimer.pausedAt = 0;
  resetTimerPanel();
  timerBadge.hidden = true;
  refreshReminderSchedule();
  timerDialog.hidden = false;
  reminderTimer.dialogOpen = true;
  syncTimerDialogAndPerch();
}

function startReminderTimer(option) {
  const focusMs = option.focusMs ?? option.focusMinutes * 60 * 1000;
  const restMs = option.restMs ?? option.restMinutes * 60 * 1000;
  const movementDelayMs = option.movementDelayMs ?? 3 * 60 * 60 * 1000;
  if (!Number.isFinite(focusMs) || focusMs <= 0 || !Number.isFinite(restMs) || restMs <= 0) return;
  const focusMinutes = option.focusMinutes ?? Math.round(focusMs / 60000);
  const restMinutes = option.restMinutes ?? Math.round(restMs / 60000);

  removeReminderGroup('pomodoro');
  reminderTimer.currentOption = { ...option, focusMs, restMs, movementDelayMs, focusMinutes, restMinutes };
  reminderTimer.pomodoroState = 'running';
  const startedAt = Date.now();
  reminderTimer.pomodoroEndAt = startedAt + focusMs;
  reminderTimer.pomodoroStartedAt = startedAt;
  reminderTimer.pomodoroDuration = focusMs;
  reminderTimer.pomodoroPhase = 'focus';
  reminderTimer.phaseStartedAt = startedAt;
  reminderTimer.phaseEndAt = startedAt + focusMs;
  reminderTimer.phaseDuration = focusMs;
  reminderTimer.pausedAt = 0;
  reminderTimer.activeButton = option.button || null;
  reminderTimer.queue.push(
    {
      group: 'pomodoro',
      type: 'focusEnd',
      label: `${focusMinutes}/${restMinutes} 专注结束`,
      message: '',
      focusMinutes,
      restMinutes,
      displayLabel: option.displayLabel ?? `${focusMinutes}/${restMinutes}`,
      tomatoHalves: option.tomatoHalves ?? (focusMinutes >= 60 ? 2 : 1),
      restMs,
      dueAt: startedAt + focusMs
    },
    {
      group: 'pomodoro',
      type: 'cycleEnd',
      label: `${focusMinutes}/${restMinutes} 周期结束`,
      message: '',
      displayLabel: option.displayLabel ?? `${focusMinutes}/${restMinutes}`,
      tomatoHalves: option.tomatoHalves ?? (focusMinutes >= 60 ? 2 : 1),
      dueAt: startedAt + focusMs + restMs
    }
  );
  timerDialog.classList.add('timer-running');
  timerDialog.classList.remove('timer-paused', 'timer-menu-expanded');
  timerOptionButtons.forEach(button => {
    button.classList.toggle('active-timer', button === reminderTimer.activeButton);
  });
  timerBadge.hidden = true;
  updateReminderCountdown();
  if (reminderTimer.tickInterval) clearInterval(reminderTimer.tickInterval);
  reminderTimer.tickInterval = setInterval(updateReminderCountdown, 200);
  refreshReminderSchedule();
  requestReminderNotificationPermission();
  syncTimerDialogAndPerch();
}

function positionTimerDialog() {
  const margin = 12;
  const anchor = pet.dialogOrigin || pet;
  const preferredLeft = anchor.x - timerDialog.offsetWidth * 0.5;
  const preferredTop = anchor.y + 62;
  const savedPosition = reminderTimer.dialogPosition;
  const left = clamp(
    savedPosition?.left ?? preferredLeft,
    margin,
    window.innerWidth - timerDialog.offsetWidth - margin
  );
  const top = clamp(
    savedPosition?.top ?? preferredTop,
    margin,
    window.innerHeight - timerDialog.offsetHeight - margin
  );
  reminderTimer.dialogPosition = { left, top };
  timerDialog.style.left = `${left}px`;
  timerDialog.style.top = `${top}px`;
  timerDialog.style.right = 'auto';
  return getTimerDialogPerchPoint(left, top);
}

function getTimerDialogPerchPoint(left, top) {
  return {
    x: left + timerDialog.offsetWidth - 31,
    y: top - 48
  };
}

function cancelBirdPositionAnimation() {
  if (pet.positionAnimation) pet.positionAnimation.cancel();
  pet.positionAnimation = null;
}

function animateBirdPosition(target, options = {}) {
  cancelBirdPositionAnimation();
  const start = { x: pet.x, y: pet.y };
  const duration = options.duration ?? 520;
  const jumpHeight = options.jumpHeight ?? 58;
  const startScale = options.startScale ?? 1;
  const endScale = options.endScale ?? 1;
  const middleScale = Math.max(startScale, endScale) + 0.05;
  const startTransform = `translate(-50%, -50%) translate3d(${start.x}px, ${start.y}px, 0) scale(${startScale})`;
  const middleTransform = `translate(-50%, -50%) translate3d(${(start.x + target.x) / 2}px, ${(start.y + target.y) / 2 - jumpHeight}px, 0) scale(${middleScale})`;
  const endTransform = `translate(-50%, -50%) translate3d(${target.x}px, ${target.y}px, 0) scale(${endScale})`;

  const animation = birdWrap.animate(
    [
      { transform: startTransform, offset: 0 },
      { transform: middleTransform, offset: 0.5 },
      { transform: endTransform, offset: 1 }
    ],
    {
      duration,
      easing: 'cubic-bezier(0.3, 0.75, 0.25, 1)',
      fill: 'forwards'
    }
  );
  pet.positionAnimation = animation;

  animation.onfinish = () => {
    animation.cancel();
    pet.positionAnimation = null;
    pet.x = target.x;
    pet.y = target.y;
    renderBird({ scale: endScale });
    options.done?.();
  };
}

function openTimerDialog() {
  if (!pet.ready || pet.state === 'hatching') return;

  clearInactivityTimer();
  clearPetTimers();
  stopMotionLoops();
  cancelNuzzleHover();
  pet.nuzzleArmed = true;
  if (!reminderTimer.dialogOpen) {
    pet.dialogOrigin = { x: pet.x, y: pet.y, face: pet.face };
    reminderTimer.dialogPosition = null;
  }
  reminderTimer.dialogOpen = true;
  customReminderError.textContent = '';
  timerDialog.hidden = false;
  restoreDefaultBirdImage();
  pet.face = -1;
  updateFacingStyles();
  setPetState('dialogPerch');
  const perchPoint = positionTimerDialog();
  animateBirdPosition(perchPoint, {
    jumpHeight: 70,
    endScale: 0.65,
    done: schedulePerchIdleMotion
  });
}

const chineseNumberPattern = '[零〇一二两三四五六七八九十百壹贰叁肆伍陆柒捌玖拾佰\\d]+';

function chineseNumberToValue(value) {
  if (/^\d+$/.test(value)) return Number(value);
  const digits = {
    零: 0, 〇: 0, 一: 1, 二: 2, 两: 2, 三: 3, 四: 4, 五: 5,
    六: 6, 七: 7, 八: 8, 九: 9, 壹: 1, 贰: 2, 叁: 3, 肆: 4,
    伍: 5, 陆: 6, 柒: 7, 捌: 8, 玖: 9
  };
  if ([...value].every(char => Object.hasOwn(digits, char))) {
    return Number([...value].map(char => digits[char]).join(''));
  }

  let total = 0;
  let current = 0;
  for (const char of value) {
    if (Object.hasOwn(digits, char)) current = digits[char];
    else if (char === '十' || char === '拾') {
      total += (current || 1) * 10;
      current = 0;
    } else if (char === '百' || char === '佰') {
      total += (current || 1) * 100;
      current = 0;
    } else {
      return NaN;
    }
  }
  return total + current;
}

function cleanReminderEvent(value) {
  return value
    .replace(/提醒我/g, ' ')
    .replace(/\s+/g, ' ')
    .replace(/^[，,。.!！、；;：:\s]+|[，,。.!！、；;：:\s]+$/g, '')
    .replace(/^(?:请|麻烦|记得)\s*/, '')
    .replace(/^(?:要|需要|得)\s*/, '')
    .replace(/^[，,。.!！、；;：:\s]+|[，,。.!！、；;：:\s]+$/g, '')
    .trim() || '提醒事项';
}

function resolveReminderClock(period, hour, minute) {
  if (!Number.isInteger(hour) || !Number.isInteger(minute) || minute < 0 || minute > 59) return null;
  if (period === '上午' || period === '早上') {
    if (hour < 1 || hour > 11) return null;
  } else if (period === '下午') {
    if (hour < 1 || hour > 6) return null;
    hour += 12;
  } else if (period === '晚上') {
    if (hour < 7 || hour > 11) return null;
    hour += 12;
  } else if (period === '中午') {
    if (![11, 12].includes(hour)) return null;
  } else if (period === '凌晨') {
    if (hour < 0 || hour > 5) return null;
  } else if (period === '傍晚') {
    if (hour < 5 || hour > 7) return null;
    if (hour < 12) hour += 12;
  } else if (hour < 0 || hour > 23) {
    return null;
  }
  return { hour, minute };
}

function parseNaturalReminder(input, baseNow = new Date()) {
  const now = new Date(baseNow);
  const number = chineseNumberPattern;
  let message = input;

  const relativePattern = new RegExp(
    `(?:(${number})\\s*个?半(?:小时|h)|(半(?:小时|h))|(${number})\\s*个?(?:小时|h)(?:\\s*(${number})\\s*(?:分钟|min))?|(${number})\\s*(?:分钟|min))后`,
    'i'
  );
  const relativeMatch = message.match(relativePattern);
  if (relativeMatch) {
    let durationMs;
    if (relativeMatch[1]) {
      durationMs = (chineseNumberToValue(relativeMatch[1]) * 60 + 30) * 60000;
    } else if (relativeMatch[2]) {
      durationMs = 30 * 60000;
    } else if (relativeMatch[3]) {
      durationMs = (
        chineseNumberToValue(relativeMatch[3]) * 60
        + chineseNumberToValue(relativeMatch[4] || '0')
      ) * 60000;
    } else {
      durationMs = chineseNumberToValue(relativeMatch[5]) * 60000;
    }
    if (!Number.isFinite(durationMs)) return null;
    message = message.replace(relativeMatch[0], ' ');
    return {
      dueAt: now.getTime() + durationMs,
      message: cleanReminderEvent(message),
      raw: input
    };
  }

  let targetDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let matchedDate = false;
  let matchedTime = false;
  let rollIfPast = false;
  let weekPrefix = '';
  let inferredPeriod = '';

  const consume = (pattern, callback) => {
    const match = message.match(pattern);
    if (!match) return false;
    if (callback(match) === false) return false;
    message = message.replace(match[0], ' ');
    return true;
  };

  const fullDatePattern = new RegExp(`(?:(${number})年)?(${number})月(${number})(?:日|号)`);
  const thisMonthPattern = new RegExp(`本月(${number})(?:日|号)`);
  const weekPattern = /(本周|这周|下周|周|星期)(?:星期|周)?([一二三四五六日天1-7])/;

  if (consume(weekPattern, match => {
    const weekdays = { 一: 0, 二: 1, 三: 2, 四: 3, 五: 4, 六: 5, 日: 6, 天: 6 };
    const targetWeekday = weekdays[match[2]] ?? Number(match[2]) - 1;
    const currentWeekday = (now.getDay() + 6) % 7;
    const monday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - currentWeekday);
    const weekOffset = match[1] === '下周' ? 7 : 0;
    targetDate = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + weekOffset + targetWeekday);
    weekPrefix = match[1];
    matchedDate = true;
  })) {
    // Week expression has highest date priority.
  } else if (consume(thisMonthPattern, match => {
    const day = chineseNumberToValue(match[1]);
    const candidate = new Date(now.getFullYear(), now.getMonth(), day);
    if (candidate.getMonth() !== now.getMonth() || candidate.getDate() !== day) return false;
    targetDate = candidate;
    matchedDate = true;
  })) {
    // Current-month expression parsed.
  } else if (consume(fullDatePattern, match => {
    const year = match[1] ? chineseNumberToValue(match[1]) : now.getFullYear();
    const month = chineseNumberToValue(match[2]);
    const day = chineseNumberToValue(match[3]);
    const candidate = new Date(year, month - 1, day);
    if (
      candidate.getFullYear() !== year
      || candidate.getMonth() !== month - 1
      || candidate.getDate() !== day
    ) return false;
    targetDate = candidate;
    matchedDate = true;
  })) {
    // Absolute date parsed.
  } else {
    consume(/今天|今晚|明天|明早|后天|大后天/, match => {
      const offsets = { 今天: 0, 今晚: 0, 明天: 1, 明早: 1, 后天: 2, 大后天: 3 };
      targetDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() + offsets[match[0]]);
      inferredPeriod = match[0] === '明早' ? '早上' : match[0] === '今晚' ? '晚上' : '';
      matchedDate = true;
      rollIfPast = ['今天', '今晚'].includes(match[0]);
    });
  }

  const pointTimePattern = new RegExp(
    `(上午|下午|晚上|中午|早上|凌晨|傍晚)?\\s*(${number})点(?:(${number})分|(半))?`
  );
  const colonTimePattern = new RegExp(
    `(上午|下午|晚上|中午|早上|凌晨|傍晚)?\\s*(${number})[:：](${number})`
  );
  let invalidClock = false;

  if (!consume(pointTimePattern, match => {
    const clock = resolveReminderClock(
      match[1] || inferredPeriod,
      chineseNumberToValue(match[2]),
      match[4] ? 30 : chineseNumberToValue(match[3] || '0')
    );
    if (!clock) {
      invalidClock = true;
      return false;
    }
    targetDate.setHours(clock.hour, clock.minute, 0, 0);
    matchedTime = true;
  })) {
    consume(colonTimePattern, match => {
      const clock = resolveReminderClock(
        match[1] || inferredPeriod,
        chineseNumberToValue(match[2]),
        chineseNumberToValue(match[3])
      );
      if (!clock) {
        invalidClock = true;
        return false;
      }
      targetDate.setHours(clock.hour, clock.minute, 0, 0);
      matchedTime = true;
    });
  }
  if (invalidClock) return null;

  if (!matchedTime) {
    const periodMatch = message.match(/上午|下午|晚上|中午|早上|凌晨|傍晚/);
    const period = periodMatch?.[0] || inferredPeriod;
    if (periodMatch) message = message.replace(periodMatch[0], ' ');
    const defaults = {
      上午: [9, 0], 下午: [15, 0], 晚上: [20, 0], 中午: [11, 30],
      早上: [9, 0], 凌晨: [1, 0], 傍晚: [18, 0]
    };
    if (period) {
      targetDate.setHours(...defaults[period], 0, 0);
      matchedTime = true;
    } else if (matchedDate) {
      targetDate.setHours(0, 0, 0, 0);
    }
  }

  if (!matchedDate && !matchedTime) return null;
  if (!matchedDate) {
    rollIfPast = true;
    targetDate = new Date(
      now.getFullYear(), now.getMonth(), now.getDate(),
      targetDate.getHours(), targetDate.getMinutes()
    );
  }

  if (weekPrefix && weekPrefix !== '下周' && targetDate <= now) {
    targetDate.setDate(targetDate.getDate() + 7);
  } else if (rollIfPast && targetDate <= now) {
    targetDate.setDate(targetDate.getDate() + 1);
  }

  return {
    dueAt: targetDate.getTime(),
    message: cleanReminderEvent(message),
    raw: input
  };
}

function escapeCalendarText(value) {
  return value
    .replace(/\\/g, '\\\\')
    .replace(/\r?\n/g, '\\n')
    .replace(/([,;])/g, '\\$1');
}

function formatCalendarDate(timestamp) {
  return new Date(timestamp)
    .toISOString()
    .replace(/[-:]/g, '')
    .replace(/\.\d{3}Z$/, 'Z');
}

function downloadCalendarEvent(title, dueAt) {
  const endAt = dueAt + 30 * 60 * 1000;
  const eventId = `${Date.now()}-${Math.random().toString(36).slice(2)}@mango-bird`;
  const calendar = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Mango Bird//Reminder//ZH-CN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    `UID:${eventId}`,
    `DTSTAMP:${formatCalendarDate(Date.now())}`,
    `DTSTART:${formatCalendarDate(dueAt)}`,
    `DTEND:${formatCalendarDate(endAt)}`,
    `SUMMARY:${escapeCalendarText(title)}`,
    `DESCRIPTION:${escapeCalendarText(title)}`,
    'BEGIN:VALARM',
    'TRIGGER:-PT0M',
    'ACTION:DISPLAY',
    `DESCRIPTION:${escapeCalendarText(title)}`,
    'END:VALARM',
    'END:VEVENT',
    'END:VCALENDAR'
  ].join('\r\n');
  const blob = new Blob([calendar], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = 'mango-bird-reminder.ics';
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function addCustomReminder(message, dueAt = null, calendarTitle = message) {
  const memoId = `memo-${Date.now()}-${Math.random()}`;
  reminderMemos.push({
    id: memoId,
    message,
    dueAt,
    done: false,
    triggered: false
  });
  if (Number.isFinite(dueAt) && dueAt > Date.now()) {
    reminderTimer.queue.push({
      group: `custom-${memoId}`,
      type: 'custom',
      label: '自定义提醒',
      message,
      memoId,
      dueAt
    });
    refreshReminderSchedule();
    requestReminderNotificationPermission();
    downloadCalendarEvent(calendarTitle, dueAt);
  }
  renderReminderMemos();
}

function closeTimerDialog(options = {}) {
  const returnPoint = pet.dialogOrigin;
  clearPerchIdleMotion();
  reminderTimer.dialogOpen = false;
  reminderTimer.dialogDrag = null;
  reminderTimer.dialogPosition = null;
  timerDialog.classList.remove('dragging');
  timerDialog.hidden = true;
  pet.dialogOrigin = null;

  if (!options.preserveBird && pet.ready && pet.state === 'dialogPerch') {
    if (returnPoint) {
      pet.face = returnPoint.face;
      updateFacingStyles();
      animateBirdPosition(returnPoint, {
        jumpHeight: 48,
        duration: 440,
        startScale: 0.65,
        done: () => returnToIdle({ resetInactivity: options.resetInactivity ?? true })
      });
    } else {
      returnToIdle({ resetInactivity: options.resetInactivity ?? true });
    }
  } else if ((options.resetInactivity ?? true) && pet.ready && pet.state === 'idle') {
    scheduleHeadBlink();
  }
}

function getWeatherVisual(code) {
  return weatherVisuals.find(item => item.codes.includes(code)) ||
    { icon: '🌡️', label: '天气状况未知' };
}

function showWeatherLoading() {
  weatherBubble.className = 'weather-bubble';
  weatherBubbleIcon.textContent = '';
  weatherBubbleTemperature.textContent = '';
}

function showWeather(current, locationLabel) {
  const visual = getWeatherVisual(current.code);
  const temperature = Number.isFinite(current.temperature)
    ? Math.round(current.temperature)
    : null;
  weather.visual = visual;
  weather.temperature = temperature;
  weather.description = `${locationLabel}当前天气：${visual.label}${temperature === null ? '' : `，${temperature}°C`}`;
  weatherBubbleIcon.textContent = visual.icon;
  weatherBubbleTemperature.textContent = temperature === null ? '--°' : `${temperature}°`;
  weatherBubble.title = weather.description;
  weatherBubbleHit.setAttribute('aria-label', `${weather.description}，点击关闭`);

  if (weather.pendingBubble) {
    weather.pendingBubble = false;
    spitWeatherBubble();
  }
}

function showWeatherUnavailable() {
  weather.pendingBubble = false;
  weatherBubble.className = 'weather-bubble';
  weatherBubbleHit.className = 'weather-bubble-hit';
  weatherBubbleIcon.textContent = '';
  weatherBubbleTemperature.textContent = '';
  weatherBubble.title = '暂时无法获取当前天气';
  weatherBubbleHit.setAttribute('aria-label', '暂时无法获取当前天气');
}

function clearWeatherBubbleTimers() {
  if (weather.bubbleTimer) clearTimeout(weather.bubbleTimer);
  if (weather.burstTimer) clearTimeout(weather.burstTimer);
  weather.bubbleTimer = null;
  weather.burstTimer = null;
}

function burstWeatherBubble() {
  if (!weatherBubble.classList.contains('visible') ||
      weatherBubble.classList.contains('bursting')) return;

  clearWeatherBubbleTimers();
  weatherBubbleHit.classList.remove('active');
  weatherBubble.classList.remove('spitting');
  weatherBubble.classList.add('bursting');
  weather.burstTimer = setTimeout(() => {
    weather.burstTimer = null;
    weatherBubble.className = 'weather-bubble';
    weatherBubbleHit.className = 'weather-bubble-hit';
  }, 380);
}

function spitWeatherBubble() {
  if (!pet.ready || blocksLiveInteraction()) return;

  if (!weather.loaded || !weather.visual ||
      Date.now() - weather.fetchedAt > 10 * 60 * 1000) {
    weather.pendingBubble = true;
    loadTodayWeather();
    return;
  }

  clearWeatherBubbleTimers();
  weatherBubble.className = 'weather-bubble';
  weatherBubbleHit.className = 'weather-bubble-hit';
  weatherBubble.style.setProperty('--bubble-from-x', pet.face > 0 ? '160px' : '58px');
  weatherBubbleIcon.textContent = weather.visual.icon;
  weatherBubbleTemperature.textContent = weather.temperature === null
    ? '--°'
    : `${weather.temperature}°`;
  weatherBubble.title = weather.description;
  weatherBubbleHit.setAttribute('aria-label', `${weather.description}，点击关闭`);

  requestAnimationFrame(() => {
    weatherBubble.classList.add('visible', 'spitting');
    weather.bubbleTimer = setTimeout(() => {
      weather.bubbleTimer = null;
      weatherBubble.classList.remove('spitting');
      weatherBubbleHit.classList.add('active');
      weather.bubbleTimer = setTimeout(() => {
        weather.bubbleTimer = null;
        burstWeatherBubble();
      }, 10000);
    }, 780);
  });
}

function requestBrowserLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) {
      reject(new Error('Geolocation is unavailable'));
      return;
    }

    navigator.geolocation.getCurrentPosition(
      position => resolve({
        latitude: position.coords.latitude,
        longitude: position.coords.longitude,
        label: '当前位置'
      }),
      reject,
      {
        enableHighAccuracy: true,
        timeout: 7000,
        maximumAge: 5 * 60 * 1000
      }
    );
  });
}

async function fetchTodayWeather(location) {
  const params = new URLSearchParams({
    latitude: location.latitude,
    longitude: location.longitude,
    current: 'weather_code,temperature_2m',
    timezone: 'auto'
  });
  const response = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);

  if (!response.ok) {
    throw new Error(`Weather request failed: ${response.status}`);
  }

  const data = await response.json();
  const code = data.current?.weather_code;
  if (!Number.isFinite(code)) {
    throw new Error('Weather code is missing');
  }

  return {
    code,
    temperature: data.current?.temperature_2m
  };
}

async function loadTodayWeather() {
  if (weather.loading) return;
  if (weather.loaded && Date.now() - weather.fetchedAt <= 10 * 60 * 1000) return;

  weather.loaded = false;
  weather.loading = true;
  showWeatherLoading();

  let location;
  try {
    location = await requestBrowserLocation();
  } catch {
    location = fallbackWeatherLocation;
  }

  try {
    const current = await fetchTodayWeather(location);
    weather.loaded = true;
    weather.fetchedAt = Date.now();
    showWeather(current, location.label);
  } catch {
    if (location !== fallbackWeatherLocation) {
      try {
        const current = await fetchTodayWeather(fallbackWeatherLocation);
        weather.loaded = true;
        weather.fetchedAt = Date.now();
        showWeather(current, fallbackWeatherLocation.label);
        return;
      } catch {
        // Keep the unobtrusive unavailable indicator below.
      }
    }
    showWeatherUnavailable();
  } finally {
    weather.loading = false;
  }
}

function blocksLiveInteraction(state = pet.state) {
  return ['hidden', 'hatching', 'sleeping', 'waking', 'dialogPerch', 'pomodoro'].includes(state);
}

function clamp(value, min, max) {
  return Math.min(Math.max(value, min), max);
}

function clampPoint(point) {
  const pad = Math.min(config.screenPadding, Math.max(38, window.innerWidth * 0.12));
  return {
    x: clamp(point.x, pad, window.innerWidth - pad),
    y: clamp(point.y, pad, window.innerHeight - pad)
  };
}

function getBirdCenter() {
  return { x: pet.x, y: pet.y };
}

function distanceBetween(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function distanceToBird(x, y) {
  return distanceBetween({ x, y }, getBirdCenter());
}

function getBirdBodyMetrics() {
  const rect = birdWrap.getBoundingClientRect();
  const imageBoxSize = Math.max(rect.width, rect.height);
  const bodySize = imageBoxSize * config.visibleBodyRatio;
  return {
    rect,
    imageBoxSize,
    bodySize,
    chaseClickDistance: bodySize * config.chaseClickBodyScale
  };
}

function getBirdHeadPoint() {
  const offsetX = pet.face < 0 ? config.leftHeadOffsetX : config.headOffsetX;
  return {
    x: pet.x + pet.face * offsetX,
    y: pet.y + config.headOffsetY
  };
}

function distanceToBirdHead(x, y) {
  return distanceBetween({ x, y }, getBirdHeadPoint());
}

function isPointerInHeadZone(pointer) {
  if (!pointer) return false;
  if (pointer.y > pet.y + config.headBottomOffsetY) return false;

  const head = getBirdHeadPoint();
  const radiusX = pet.face < 0 ? config.leftHeadNuzzleRadiusX : config.headNuzzleRadiusX;
  const dx = (pointer.x - head.x) / radiusX;
  const dy = (pointer.y - head.y) / config.headNuzzleRadiusY;
  return dx * dx + dy * dy <= 1;
}

function updateFacingStyles() {
  birdImg.style.setProperty('--face', pet.face);
  birdImg.style.setProperty('--peck-x', `${pet.face * 18}px`);
  birdImg.style.setProperty('--peck-rot', `${pet.face * 13}deg`);
}

function updateFacing(targetX) {
  pet.face = targetX < pet.x ? -1 : 1;
  updateFacingStyles();
}

function renderBird(options = {}) {
  const scale = options.scale ?? pet.scale;
  const lift = options.lift ?? 0;
  const renderedY = pet.y + lift;
  birdWrap.style.setProperty('--bird-x', `${pet.x}px`);
  birdWrap.style.setProperty('--bird-y', `${renderedY}px`);
  birdWrap.style.opacity = options.opacity ?? (birdWrap.style.opacity || '1');
  birdWrap.style.transform = `translate(-50%, -50%) translate3d(${pet.x}px, ${renderedY}px, 0) scale(${scale})`;
  shadow.style.transform = `translate(-50%, 72px) translate3d(${pet.x}px, ${pet.y}px, 0)`;
  shadow.style.width = `${118 + Math.min(54, scale * 42)}px`;
}

function stopMotionLoops() {
  if (pet.chaseFrame) cancelAnimationFrame(pet.chaseFrame);
  if (pet.nuzzleFrame) cancelAnimationFrame(pet.nuzzleFrame);
  stopFramePlayback();
  pet.chaseFrame = null;
  pet.nuzzleFrame = null;
}

function stopFramePlayback() {
  if (pet.frameTimer) clearTimeout(pet.frameTimer);
  pet.frameTimer = null;
  pet.frameIndex = 0;
}

function cancelNuzzleHover() {
  if (pet.nuzzleHoverTimer) clearTimeout(pet.nuzzleHoverTimer);
  pet.nuzzleHoverTimer = null;
}

function preloadFrameSet(name) {
  const frames = frameSets[name] || [];
  loadedFrames[name] = [];

  frames.forEach((src, index) => {
    const img = new Image();
    img.onload = () => {
      loadedFrames[name][index] = src;
    };
    img.src = src;
  });
}

function hasFrameSet(name) {
  if (!frameSets[name]) return false;
  return (loadedFrames[name] || []).filter(Boolean).length >= 2;
}

function playFrameSet(name, options = {}) {
  if (!hasFrameSet(name)) return false;

  const frames = loadedFrames[name].filter(Boolean);
  const duration = options.duration || 110;
  const durations = options.durations || null;
  const loop = options.loop ?? true;
  birdImg.src = frames[0];
  pet.frameIndex = 0;

  const frameDuration = index => durations?.[index] ?? duration;

  const step = () => {
    if (pet.state !== name) return;

    pet.frameIndex += 1;
    if (pet.frameIndex >= frames.length) {
      if (!loop) return;
      pet.frameIndex = 0;
    }

    birdImg.src = frames[pet.frameIndex];
    pet.frameTimer = setTimeout(step, frameDuration(pet.frameIndex));
  };

  pet.frameTimer = setTimeout(step, frameDuration(0));
  return true;
}

function restoreDefaultBirdImage() {
  birdImg.src = defaultBirdSrc;
}

function clearInactivityTimer() {
  if (pet.inactivityTimer) clearTimeout(pet.inactivityTimer);
  pet.inactivityTimer = null;
}

function scheduleHeadBlink() {
  clearInactivityTimer();
  if (!pet.ready || pet.state !== 'idle') return;

  pet.inactivityPhase = 'headBlink';
  pet.inactivityTimer = setTimeout(() => {
    pet.inactivityTimer = null;
    if (pet.inactivityPhase !== 'headBlink') return;
    playHeadBlink();
  }, config.headBlinkIdleDelay);
}

function scheduleSleepAfterHeadBlink() {
  clearInactivityTimer();
  if (!pet.ready || pet.state !== 'idle') return;

  pet.inactivityPhase = 'sleep';
  pet.inactivityTimer = setTimeout(() => {
    pet.inactivityTimer = null;
    if (pet.inactivityPhase !== 'sleep') return;
    enterSleep();
  }, config.sleepIdleDelay);
}

function beginPetInteraction() {
  clearInactivityTimer();
  pet.inactivityPhase = 'headBlink';
  if (pet.state === 'headBlink') {
    clearPetTimers();
    returnToIdle({ resetInactivity: false });
  }
}

function returnToIdle(options = {}) {
  if (!pet.ready) return;
  stopMotionLoops();
  restoreDefaultBirdImage();
  setPetState('idle');
  renderBird({ scale: 1 });
  if (options.resetInactivity ?? true) scheduleHeadBlink();
}

function playHeadBlink() {
  if (!pet.ready || pet.state !== 'idle') return;

  clearInactivityTimer();
  clearPetTimers();
  stopMotionLoops();
  cancelNuzzleHover();
  pet.nuzzleArmed = true;
  updateFacingStyles();
  setPetState('headBlink');
  renderBird({ scale: 1 });

  const played = playFrameSet('headBlink', {
    durations: config.headBlinkDurations,
    loop: false
  });
  const actionDuration = config.headBlinkDurations.reduce((sum, value) => sum + value, 0);

  later(() => {
    if (pet.state !== 'headBlink') return;
    stopFramePlayback();
    returnToIdle({ resetInactivity: false });
    scheduleSleepAfterHeadBlink();
  }, played ? actionDuration + 60 : 0);
}

function moveBirdToward(target, options = {}) {
  const done = options.done || (() => {});
  const speed = options.speed || config.chaseSpeed;
  const arriveDistance = options.arriveDistance || 14;
  const boundedTarget = clampPoint(target);
  stopMotionLoops();
  updateFacing(boundedTarget.x);
  playFrameSet('chase', { duration: 95, loop: true });

  const step = () => {
    const dx = boundedTarget.x - pet.x;
    const dy = boundedTarget.y - pet.y;
    const distance = Math.hypot(dx, dy);

    if (distance <= arriveDistance || pet.state !== 'chase') {
      pet.x = boundedTarget.x;
      pet.y = boundedTarget.y;
      renderBird({ scale: 1 });
      pet.chaseFrame = null;
      done();
      return;
    }

    const travel = Math.min(distance, Math.max(6, distance * speed * 0.12));
    pet.x += (dx / distance) * travel;
    pet.y += (dy / distance) * travel;
    renderBird({ scale: 1, lift: Math.sin(performance.now() / 70) * -2 });
    pet.chaseFrame = requestAnimationFrame(step);
  };

  pet.chaseFrame = requestAnimationFrame(step);
}

function playNuzzle(pointer) {
  if (!pet.ready || isReminderUiOpen() || blocksLiveInteraction() || ['chase', 'peck'].includes(pet.state)) return;

  if (pet.state === 'nuzzle') {
    if (pointer) updateFacing(pointer.x);
    renderBird({ scale: 1 });
    return;
  }

  if (!isPointerInHeadZone(pointer)) {
    cancelNuzzleHover();
    pet.nuzzleArmed = true;
    return;
  }

  if (!pet.nuzzleArmed) return;

  if (pet.nuzzleHoverTimer) return;

  pet.nuzzleHoverTimer = setTimeout(() => {
    pet.nuzzleHoverTimer = null;
    if (!pet.ready || pet.state !== 'idle' || !pet.nuzzleArmed || !isPointerInHeadZone(pet.pointer)) return;
    startNuzzle(pet.pointer);
  }, config.nuzzleDwell);
}

function startNuzzle(pointer) {
  beginPetInteraction();
  updateFacing(pointer.x);
  pet.nuzzleArmed = false;
  setPetState('nuzzle');
  stopMotionLoops();
  playFrameSet('nuzzle', { duration: config.nuzzleFrameDuration, loop: true });
  renderBird({ scale: 1 });

  later(() => {
    if (pet.state !== 'nuzzle') return;
    stopFramePlayback();
    returnToIdle();
  }, Math.max(2, (loadedFrames.nuzzle || []).filter(Boolean).length) * config.nuzzleFrameDuration * config.nuzzleLoops);
}

function playPeck(target) {
  updateFacing(target.x);
  stopFramePlayback();
  setPetState('peck');
  renderBird({ scale: 1 });
  if (!playFrameSet('peck', { duration: 110, loop: true })) {
    restoreDefaultBirdImage();
  }

  later(() => {
    if (pet.state !== 'peck') return;
    returnToIdle();
  }, config.peckDuration);
}

function playChaseAndPeck(target) {
  if (!pet.ready || blocksLiveInteraction() || ['chase', 'peck'].includes(pet.state)) return;
  beginPetInteraction();
  clearPetTimers();
  stopMotionLoops();
  cancelNuzzleHover();
  pet.nuzzleArmed = true;

  const face = target.x < pet.x ? -1 : 1;
  const boundedTarget = clampPoint({
    x: target.x - face * config.beakOffsetX,
    y: target.y - config.beakOffsetY
  });

  setPetState('chase');
  moveBirdToward(boundedTarget, {
    arriveDistance: 18,
    done: () => playPeck(target)
  });
}

function enterSleep() {
  if (!pet.ready || pet.state === 'sleeping') return;

  clearInactivityTimer();
  clearPetTimers();
  stopMotionLoops();
  cancelNuzzleHover();
  pet.nuzzleArmed = true;
  updateFacingStyles();
  setPetState('sleeping');
  playFrameSet('sleeping', { duration: config.sleepFrameDuration, loop: false });
  renderBird({ scale: 1 });
}

function wakeFromSleep() {
  if (!pet.ready || pet.state !== 'sleeping') return;

  clearInactivityTimer();
  clearPetTimers();
  stopMotionLoops();
  updateFacingStyles();
  setPetState('waking');
  playFrameSet('waking', { duration: config.ruffleFrameDuration, loop: false });
  renderBird({ scale: 1 });

  later(() => {
    if (pet.state !== 'waking') return;
    stopFramePlayback();
    returnToIdle();
  }, frameSets.waking.length * config.ruffleFrameDuration + 80);
}

function spawnBird(position = null, onReady = null) {
  pet.ready = false;
  setPetState('hatching');
  pet.x = position?.x ?? window.innerWidth / 2;
  pet.y = position?.y ?? window.innerHeight / 2 - 16;
  pet.scale = 0.3;
  birdWrap.style.transition = 'transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.18s ease';
  birdWrap.style.opacity = '1';
  shadow.style.opacity = '1';
  renderBird({ scale: 0.3, lift: 20, opacity: '1' });

  requestAnimationFrame(() => {
    pet.scale = 1;
    renderBird({ scale: 1.01, lift: -10, opacity: '1' });
  });

  later(() => {
    renderBird({ scale: 1, lift: 0 });
  }, 460);

  later(() => {
    pet.ready = true;
    birdWrap.style.transition = 'transform 0.12s linear, opacity 0.18s ease';
    renderBird({ scale: 1 });
    returnToIdle();
    onReady?.();
  }, config.hatchDuration);
}

function burstMango() {
  mangoWrap.style.transition = 'transform 0.25s ease-out, opacity 0.25s ease-out';
  mangoWrap.style.transform = 'translate(-50%, -50%) scale(1.5)';
  mangoWrap.style.opacity = '0';
  mangoWrap.style.pointerEvents = 'none';
  spawnParticles();
  later(spawnBird, 100);
  resetBtn.style.opacity = '1';
}

function hatchFromMango() {
  if (pet.state !== 'hidden') return;
  clearPetTimers();
  setPetState('hatching');
  hint.hidden = true;
  mangoWrap.style.transition = 'transform 0.08s ease-in-out';

  let shakes = 0;
  const shakeIt = () => {
    if (shakes >= 4) {
      burstMango();
      return;
    }

    const offset = shakes % 2 === 0 ? -10 : 10;
    mangoWrap.style.transform = `translate(-50%, -50%) translateX(${offset}px) rotate(${offset * 0.5}deg)`;
    shakes++;
    later(shakeIt, 80);
  };

  shakeIt();
}

function spawnParticles(origin = null) {
  const point = origin || { x: window.innerWidth / 2, y: window.innerHeight / 2 };
  const shapes = ['star-4', 'diamond', 'spark'];
  const colors = ['#ffe566', '#ffcc00', '#ffb800', '#ffd700', '#fff2a0'];

  for (let i = 0; i < 35; i++) {
    const p = document.createElement('div');
    p.className = 'particle ' + shapes[Math.floor(Math.random() * shapes.length)];
    p.style.background = colors[Math.floor(Math.random() * colors.length)];

    const startSize = 18 + Math.random() * 14;
    p.style.width = startSize + 'px';
    p.style.height = startSize + 'px';
    p.style.filter = 'drop-shadow(0 0 2px rgba(255,255,255,0.6))';
    p.style.left = `${point.x - 12 + Math.random() * 24}px`;
    p.style.top = `${point.y - 12 + Math.random() * 24}px`;

    const angle = (Math.random() - 0.3) * Math.PI * 2;
    const dist = 100 + Math.random() * 200;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 30 - Math.random() * 60;
    const rot = (Math.random() - 0.5) * 360;

    stage.appendChild(p);
    p.style.opacity = '1';
    p.style.transform = 'translate(0, 0) scale(1.2) rotate(0deg)';

    requestAnimationFrame(() => {
      p.style.transition = 'all 0.3s cubic-bezier(0,0.5,0.3,1)';
      p.style.transform = `translate(${dx}px, ${dy}px) scale(0.8) rotate(${rot}deg)`;
    });

    setTimeout(() => {
      p.style.transition = 'all 0.6s ease-in';
      p.style.transform = `translate(${dx * 1.2}px, ${dy + 60 + Math.random() * 80}px) scale(0.5) rotate(${rot * 2}deg)`;
      p.style.opacity = '0.7';
    }, 300);

    setTimeout(() => {
      p.style.transition = 'all 2s ease-out';
      p.style.opacity = '0';
      p.style.transform = `translate(${dx * 1.3}px, ${dy + 120 + Math.random() * 80}px) scale(0.05) rotate(${rot * 3}deg)`;
    }, 900);

    setTimeout(() => p.remove(), 3500);
  }
}

function handlePointerMove(event) {
  pet.pointer = { x: event.clientX, y: event.clientY };
  if (isReminderUiOpen()) {
    cancelNuzzleHover();
    pet.nuzzleArmed = true;
    return;
  }
  if (weatherBubbleHit.classList.contains('active') &&
      weatherBubbleHit.contains(event.target)) {
    cancelNuzzleHover();
    pet.nuzzleArmed = true;
    return;
  }
  if (pet.ready && pet.state === 'idle') {
    updateFacing(pet.pointer.x);
  }
  playNuzzle(pet.pointer);
}

function handleStageClick(event) {
  if (!pet.ready) return;
  if (event.target === resetBtn) return;
  if (blocksLiveInteraction()) return;

  const point = { x: event.clientX, y: event.clientY };
  const body = getBirdBodyMetrics();

  if (birdWrap.contains(event.target)) {
    return;
  }

  if (distanceToBird(point.x, point.y) >= body.chaseClickDistance) {
    playChaseAndPeck(point);
  }
}

function resetAll() {
  clearInactivityTimer();
  clearPetTimers();
  stopMotionLoops();
  clearWeatherBubbleTimers();
  clearReminderTimer();
  closeTimerDialog({ resetInactivity: false });
  cancelBirdPositionAnimation();
  document.title = defaultDocumentTitle;
  customReminderForm.reset();
  customReminderError.textContent = '';
  reminderMemos.splice(0);
  renderReminderMemos();
  if (pet.singleClickTimer) clearTimeout(pet.singleClickTimer);
  pet.singleClickTimer = null;
  weather.pendingBubble = false;
  weatherBubble.className = 'weather-bubble';
  weatherBubbleHit.className = 'weather-bubble-hit';
  stage.querySelectorAll('.particle').forEach(p => p.remove());

  pet.ready = false;
  pet.x = window.innerWidth / 2;
  pet.y = window.innerHeight / 2;
  pet.scale = 0.3;
  pet.face = 1;
  pet.pointer = null;
  pet.nuzzleArmed = true;
  pet.inactivityPhase = 'headBlink';
  cancelNuzzleHover();

  restoreDefaultBirdImage();
  updateFacingStyles();
  birdWrap.style.transition = 'none';
  birdWrap.style.opacity = '0';
  renderBird({ scale: 0.3, opacity: '0' });
  setPetState('hidden');
  birdWrap.classList.remove('ready', 'activity-jump');

  shadow.style.opacity = '0';
  shadow.style.width = '120px';
  shadow.style.transform = 'translate(-50%, 72px)';

  mangoWrap.style.pointerEvents = 'auto';
  mangoWrap.style.transition = 'transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s';
  mangoWrap.style.transform = 'translate(-50%, -50%)';
  mangoWrap.style.opacity = '1';

  hint.hidden = false;
  resetBtn.style.opacity = '0.5';
}

mangoWrap.addEventListener('click', event => {
  event.stopPropagation();
  loadTodayWeather();
  hatchFromMango();
});

weatherBubbleHit.addEventListener('click', event => {
  event.stopPropagation();
  beginPetInteraction();
  burstWeatherBubble();
  scheduleHeadBlink();
});

birdWrap.addEventListener('click', event => {
  event.stopPropagation();
  if (weatherBubbleHit.contains(event.target)) return;
  if (reminderTimer.dialogOpen && pet.state === 'dialogPerch') {
    if (['running', 'paused'].includes(reminderTimer.pomodoroState)) {
      if (timerDialog.classList.contains('timer-menu-expanded')) {
        showCollapsedTimerPanel();
      } else {
        expandTimerMenu();
      }
      return;
    }
    if (pet.singleClickTimer) clearTimeout(pet.singleClickTimer);
    pet.singleClickTimer = null;
    closeTimerDialog();
    return;
  }
  if (pet.singleClickTimer) clearTimeout(pet.singleClickTimer);
  pet.singleClickTimer = setTimeout(() => {
    pet.singleClickTimer = null;
    if (pet.state === 'sleeping') {
      wakeFromSleep();
    } else if (pet.ready && !blocksLiveInteraction()) {
      beginPetInteraction();
      spitWeatherBubble();
      scheduleHeadBlink();
    }
  }, config.singleClickDelay);
});

birdWrap.addEventListener('dblclick', event => {
  event.stopPropagation();
  if (weatherBubbleHit.contains(event.target)) return;
  if (pet.singleClickTimer) clearTimeout(pet.singleClickTimer);
  pet.singleClickTimer = null;
  if (!pet.ready || pet.state === 'hatching') return;
  if (pet.state === 'sleeping') wakeFromSleep();
  beginPetInteraction();
  openTimerDialog();
});

stage.addEventListener('pointermove', handlePointerMove);
stage.addEventListener('click', handleStageClick);
timerDialog.addEventListener('click', event => event.stopPropagation());
timerDialog.addEventListener('pointerdown', event => {
  if (event.button !== 0) return;
  if (event.target.closest('button, input, textarea, label, a')) return;
  const rect = timerDialog.getBoundingClientRect();
  reminderTimer.dialogDrag = {
    pointerId: event.pointerId,
    offsetX: event.clientX - rect.left,
    offsetY: event.clientY - rect.top
  };
  timerDialog.classList.add('dragging');
  timerDialog.setPointerCapture(event.pointerId);
  event.preventDefault();
  event.stopPropagation();
});
timerDialog.addEventListener('pointermove', event => {
  if (reminderTimer.dialogDrag?.pointerId !== event.pointerId) return;
  updateDraggedTimerDialog(event.clientX, event.clientY);
  event.stopPropagation();
});
timerDialog.addEventListener('pointerup', event => {
  if (reminderTimer.dialogDrag?.pointerId !== event.pointerId) return;
  reminderTimer.dialogDrag = null;
  timerDialog.classList.remove('dragging');
  if (timerDialog.hasPointerCapture(event.pointerId)) {
    timerDialog.releasePointerCapture(event.pointerId);
  }
  event.stopPropagation();
});
timerDialog.addEventListener('pointercancel', event => {
  if (reminderTimer.dialogDrag?.pointerId !== event.pointerId) return;
  reminderTimer.dialogDrag = null;
  timerDialog.classList.remove('dragging');
});
timerOptionButtons.forEach(button => {
  button.addEventListener('click', () => {
    if (button === reminderTimer.activeButton) {
      if (reminderTimer.pomodoroState === 'running') pausePomodoroTimer();
      return;
    }
    if (['running', 'paused'].includes(reminderTimer.pomodoroState)) return;
    const focusMinutes = Number(button.dataset.focusMinutes);
    const restMinutes = Number(button.dataset.restMinutes);
    const focusMs = Number(button.dataset.focusMs) || undefined;
    const restMs = Number(button.dataset.restMs) || undefined;
    startReminderTimer({
      focusMinutes,
      restMinutes,
      focusMs,
      restMs,
      displayLabel: button.dataset.displayLabel ?? `${focusMinutes}/${restMinutes}`,
      button,
      tomatoHalves: Number(button.dataset.tomatoHalves)
    });
  });
});
timerContinue.addEventListener('click', event => {
  event.stopPropagation();
  resumePomodoroTimer();
});
timerCancel.addEventListener('click', event => {
  event.stopPropagation();
  stopPomodoroTimer();
});
customReminderForm.addEventListener('submit', event => {
  event.preventDefault();
  const input = customReminderText.value.trim();

  if (!input) {
    customReminderError.textContent = '写下事项和时间，例如：明天早上9点开会。';
    customReminderText.focus();
    return;
  }

  const parsed = parseNaturalReminder(input);
  const dueAt = parsed?.dueAt > Date.now() ? parsed.dueAt : null;
  const eventName = parsed?.message || cleanReminderEvent(input);
  addCustomReminder(eventName, dueAt, eventName);
  customReminderText.value = '';
  customReminderError.textContent = parsed && !dueAt
    ? '时间已经过去，已作为普通待办保存。'
    : '';
  requestAnimationFrame(() => customReminderText.focus());
});
customReminderText.addEventListener('keydown', event => {
  if (event.key !== 'Enter' || event.isComposing) return;
  event.preventDefault();
  customReminderForm.requestSubmit();
});
timerBadge.addEventListener('click', event => {
  event.stopPropagation();
  beginPetInteraction();
  if (reminderTimer.pomodoroState === 'running') {
    stopPomodoroTimer();
  } else if (reminderTimer.pomodoroState === 'ready' && reminderTimer.currentOption) {
    startReminderTimer(reminderTimer.currentOption);
  }
});
resetBtn.addEventListener('click', event => {
  event.stopPropagation();
  resetAll();
});

window.addEventListener('resize', () => {
  pet.x = clamp(pet.x, config.screenPadding, window.innerWidth - config.screenPadding);
  pet.y = clamp(pet.y, config.screenPadding, window.innerHeight - config.screenPadding);
  renderBird({ scale: pet.ready ? 1 : pet.scale, opacity: pet.ready ? '1' : birdWrap.style.opacity });
  if (reminderTimer.dialogOpen) {
    const perchPoint = positionTimerDialog();
    pet.x = perchPoint.x;
    pet.y = perchPoint.y;
    renderBird({ scale: 0.65 });
  }
});

window.resetAll = resetAll;
window.setPetState = setPetState;
window.getBirdCenter = getBirdCenter;
window.getBirdBodyMetrics = getBirdBodyMetrics;
window.getBirdHeadPoint = getBirdHeadPoint;
window.distanceToBird = distanceToBird;
window.distanceToBirdHead = distanceToBirdHead;
window.moveBirdToward = moveBirdToward;
window.playNuzzle = playNuzzle;
window.playChaseAndPeck = playChaseAndPeck;
window.enterSleep = enterSleep;
window.wakeFromSleep = wakeFromSleep;
window.returnToIdle = returnToIdle;
window.playHeadBlink = playHeadBlink;
window.loadTodayWeather = loadTodayWeather;
window.openTimerDialog = openTimerDialog;
window.startReminderTimer = startReminderTimer;
window.finishReminderTimer = finishReminderTimer;
window.parseNaturalReminder = parseNaturalReminder;
window.makeCuteReminderText = makeCuteReminderText;

Object.keys(frameSets).forEach(preloadFrameSet);
resetAll();
</script>

</body>
</html>
