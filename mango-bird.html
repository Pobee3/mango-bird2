<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>芒果小鸟互动原型</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #fdf6ee;
    font-family: 'PingFang SC', 'Noto Sans SC', sans-serif;
    user-select: none;
  }

  .stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    cursor: default;
    touch-action: none;
  }

  /* ---- Mango ---- */
  .mango-wrap {
    position: absolute;
    left: 50%;
    top: 50%;
    width: min(350px, 49vw);
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 4;
    transform-origin: center;
    transition: transform 0.18s ease, opacity 0.25s ease;
  }

  .mango-wrap:hover { transform: translate(-50%, -50%) scale(1.04); }
  .mango-wrap:active { transform: translate(-50%, -50%) scale(0.96); }

  .mango-img {
    display: block;
    width: 100%;
    height: auto;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.18));
    pointer-events: none;
    transform-origin: 50% 58%;
    animation: mangoBreath 1.8s ease-in-out infinite;
  }

  /* ---- Bird ---- */
  .bird-wrap {
    position: absolute;
    left: 0;
    top: 0;
    width: clamp(150px, 22vw, 230px);
    opacity: 0;
    z-index: 8;
    pointer-events: none;
    transform: translate(-50%, -50%) translate3d(0, 0, 0) scale(0.3);
    transform-origin: center 76%;
    will-change: transform, opacity;
  }

  .bird-wrap.ready {
    pointer-events: auto;
    cursor: pointer;
  }

  .bird-img {
    position: relative;
    z-index: 2;
    display: block;
    width: 100%;
    height: auto;
    filter: drop-shadow(0 8px 22px rgba(0,0,0,0.2));
    transform-origin: 50% 50%;
    will-change: transform;
    pointer-events: none;
  }

  .bird-wrap.idle .bird-img {
    animation: birdIdle 1.6s ease-in-out infinite;
  }

  .bird-wrap.nuzzle .bird-img {
    animation: birdNuzzle 0.7s ease-in-out infinite;
  }

  .bird-wrap.nuzzle.has-frames .bird-img {
    animation: none;
    transform: scaleX(var(--face, 1));
  }

  .bird-wrap.chase .bird-img {
    animation: birdRunFlap 0.34s ease-in-out infinite;
  }

  .bird-wrap.chase.has-frames .bird-img {
    animation: none;
    transform: scaleX(var(--face, 1));
  }

  .bird-wrap.peck .bird-img {
    animation: birdPeck 0.28s ease-in-out 3;
  }

  .bird-wrap.peck.has-frames .bird-img {
    animation: none;
    transform: scaleX(var(--face, 1));
  }

  .bird-wrap.sleeping .bird-img {
    animation: birdSleepBreath 2.4s ease-in-out infinite;
  }

  .bird-wrap.waking .bird-img {
    animation: none;
    transform: scaleX(var(--face, 1));
  }

  .bird-wrap.headBlink .bird-img {
    animation: none;
    transform: scaleX(var(--face, 1));
  }

  .bird-wrap.dialogPerch .bird-img {
    animation: birdPerchBreath 4.8s ease-in-out infinite;
    transform-origin: 50% 90%;
    transform: scaleX(var(--face, 1));
  }

  .bird-wrap.dialogPerch.perch-tilt .bird-img {
    animation: birdPerchTilt 1.15s ease-in-out;
  }

  .bird-wrap.dialogPerch {
    z-index: 31;
  }

  /* ---- Weather ---- */
  .weather-bubble {
    position: absolute;
    z-index: 5;
    left: -16%;
    top: -14%;
    min-width: clamp(82px, 10vw, 98px);
    width: auto;
    height: clamp(44px, 6vw, 60px);
    padding: 0 13px 0 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    border: 1px solid rgba(255, 255, 255, 0.86);
    border-radius: 999px;
    background:
      radial-gradient(circle at 31% 24%, rgba(255,255,255,0.95) 0 7%, transparent 8%),
      radial-gradient(circle at 42% 37%, rgba(255,255,255,0.5), transparent 58%),
      rgba(238, 249, 251, 0.7);
    box-shadow:
      inset -5px -7px 12px rgba(129, 183, 205, 0.12),
      0 7px 18px rgba(86, 115, 128, 0.17);
    backdrop-filter: blur(7px);
    pointer-events: none;
    opacity: 0;
    transform: translate(var(--bubble-from-x, 160px), 62px) scale(0.12);
    transform-origin: center;
  }

  .weather-bubble.spitting {
    animation: weatherBubbleSpit 0.78s cubic-bezier(0.2, 0.9, 0.24, 1.25) forwards;
  }

  .weather-bubble.visible:not(.spitting) {
    opacity: 1;
    animation: weatherBubbleFloat 2.6s ease-in-out infinite;
  }

  .weather-bubble.bursting {
    pointer-events: none;
    animation: weatherBubbleBurst 0.34s ease-out forwards;
  }

  .weather-bubble-spark {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    opacity: 0;
    background: rgba(197, 235, 246, 0.94);
    box-shadow: 0 0 5px rgba(255, 255, 255, 0.9);
    pointer-events: none;
  }

  .weather-bubble.bursting .weather-bubble-spark {
    animation: weatherBubbleSpark 0.38s ease-out forwards;
    animation-delay: var(--spark-delay, 0s);
  }

  .weather-bubble-hit {
    position: absolute;
    z-index: 6;
    left: -16%;
    top: -14%;
    width: clamp(82px, 10vw, 98px);
    height: clamp(44px, 6vw, 60px);
    border: 0;
    border-radius: 999px;
    background: transparent;
    cursor: pointer;
    pointer-events: none;
    opacity: 0;
  }

  .weather-bubble-hit.active {
    pointer-events: auto;
  }

  .weather-bubble-icon {
    font-size: clamp(24px, 3.5vw, 32px);
    line-height: 1;
    filter: drop-shadow(0 2px 3px rgba(76, 58, 40, 0.12));
  }

  .weather-bubble-temperature {
    color: #58747b;
    font-size: clamp(13px, 1.8vw, 16px);
    font-weight: 750;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.72);
  }

  .bird-wrap.activity-jump {
    animation: birdActivityJump 0.62s ease-in-out 3;
  }

  .reminder-pop {
    position: absolute;
    z-index: 7;
    left: -24%;
    top: -16%;
    min-width: 58px;
    max-width: 190px;
    padding: 11px 14px;
    border: 1px solid rgba(255, 255, 255, 0.9);
    border-radius: 16px;
    background: rgba(255, 249, 240, 0.94);
    box-shadow: 0 9px 22px rgba(86, 67, 48, 0.17);
    color: #674d3b;
    pointer-events: none;
    opacity: 0;
    transform: translate(82px, 55px) scale(0.2);
    backdrop-filter: blur(8px);
  }

  .reminder-pop.visible {
    animation: reminderPopIn 0.58s cubic-bezier(0.2, 0.9, 0.24, 1.2) forwards;
  }

  .reminder-pop.hiding {
    animation: reminderPopOut 0.28s ease-in forwards;
  }

  .reminder-pop.icon-only {
    display: grid;
    place-items: center;
    min-width: 58px;
    min-height: 58px;
    padding: 8px;
    border-radius: 18px;
    font-size: 2rem;
  }

  .reminder-pop.custom {
    border-radius: 12px;
    line-height: 1.45;
    font-size: 0.82rem;
    word-break: break-word;
  }

  /* ---- Reminder timer ---- */
  .bird-dialog {
    position: fixed;
    z-index: 30;
    width: min(304px, calc(100vw - 28px));
    padding: 18px;
    border: 1px solid rgba(222, 255, 253, 0.34);
    border-radius: 22px;
    background:
      linear-gradient(145deg, rgba(229, 255, 253, 0.13), rgba(190, 239, 238, 0.05)),
      rgba(207, 246, 245, 0.035);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.32),
      0 14px 34px rgba(72, 126, 123, 0.075);
    backdrop-filter: blur(20px) saturate(1.08);
    -webkit-backdrop-filter: blur(20px) saturate(1.08);
    color: #597674;
    max-height: calc(100vh - 48px);
    overflow: hidden;
    transform-origin: 82% 0;
    animation: dialogPop 0.22s cubic-bezier(0.2, 0.85, 0.28, 1.2);
    cursor: grab;
    touch-action: none;
  }

  .bird-dialog.dragging {
    cursor: grabbing;
    user-select: none;
  }

  .bird-dialog button,
  .bird-dialog input,
  .bird-dialog textarea,
  .bird-dialog label {
    cursor: auto;
  }

  .bird-dialog[hidden],
  .timer-badge[hidden] {
    display: none;
  }

  .bird-dialog h2 {
    font-size: 0.96rem;
    line-height: 1.35;
  }

  .bird-dialog-copy {
    margin-top: 3px;
    color: #92745e;
    font-size: 0.84rem;
    line-height: 1.55;
  }

  .timer-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 9px;
  }

  .timer-option {
    position: relative;
    isolation: isolate;
    overflow: hidden;
    min-height: 42px;
    padding: 8px;
    border: 1px solid rgba(206, 241, 239, 0.42);
    border-radius: 12px;
    background: rgba(239, 255, 254, 0.16);
    color: #597674;
    cursor: pointer;
    transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
  }

  .timer-option:hover {
    transform: translateY(-2px);
    border-color: rgba(170, 226, 222, 0.66);
    background: rgba(226, 252, 250, 0.32);
  }

  .timer-option::before {
    content: "";
    position: absolute;
    z-index: -1;
    inset: 0;
    width: var(--timer-progress, 0%);
    border-radius: inherit;
    background:
      linear-gradient(90deg, rgba(138, 221, 214, 0.28), rgba(178, 242, 236, 0.62));
    box-shadow:
      inset -2px 0 5px rgba(225, 255, 252, 0.74),
      0 0 8px rgba(118, 218, 210, 0.34);
    transition: width 0.2s linear;
  }

  .timer-option-countdown {
    display: none;
    font-size: 0.9rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.03em;
  }

  .bird-dialog.timer-running {
    width: min(142px, calc(100vw - 28px));
    padding: 12px;
  }

  .bird-dialog.timer-running h2,
  .bird-dialog.timer-running .custom-reminder,
  .bird-dialog.timer-running .memo-list,
  .bird-dialog.timer-running .timer-option:not(.active-timer) {
    display: none;
  }

  .bird-dialog.timer-running .timer-options {
    grid-template-columns: 1fr;
    margin-top: 0;
  }

  .bird-dialog.timer-running .timer-option.active-timer {
    width: 112px;
    min-height: 46px;
    transform: none;
    border-color: rgba(157, 224, 218, 0.68);
  }

  .bird-dialog.timer-running .timer-option-label,
  .bird-dialog.timer-menu-expanded .timer-option.active-timer .timer-option-label {
    display: none;
  }

  .bird-dialog.timer-running .timer-option-countdown,
  .bird-dialog.timer-menu-expanded .timer-option.active-timer .timer-option-countdown {
    display: inline;
  }

  .bird-dialog.timer-menu-expanded .timer-option:not(.active-timer) {
    opacity: 0.48;
  }

  .bird-dialog.timer-paused {
    z-index: 32;
    width: min(248px, calc(100vw - 28px));
  }

  .bird-dialog.timer-paused .timer-options {
    grid-template-columns: 112px auto;
    align-items: center;
  }

  .timer-pause-actions {
    display: none;
    grid-template-columns: auto auto;
    gap: 5px;
  }

  .bird-dialog.timer-paused .timer-pause-actions {
    display: grid;
  }

  .timer-pause-action {
    height: 34px;
    padding: 0 9px;
    border: 1px solid rgba(157, 218, 214, 0.58);
    border-radius: 9px;
    background: rgba(195, 235, 232, 0.5);
    color: #456c69;
    font-size: 0.74rem;
    cursor: pointer;
  }

  .timer-pause-action.cancel {
    background: rgba(239, 226, 220, 0.48);
    border-color: rgba(224, 198, 187, 0.58);
    color: #81665e;
  }

  .custom-reminder {
    margin-top: 12px;
    padding-top: 11px;
    border-top: 1px solid rgba(206, 241, 239, 0.34);
  }

  .custom-reminder-title {
    font-size: 0.96rem;
    line-height: 1.35;
    font-weight: 650;
  }

  .custom-reminder-fields {
    width: 100%;
    margin-top: 8px;
  }

  .custom-reminder textarea {
    width: 100%;
    min-width: 0;
    max-width: 100%;
    height: 42px;
    min-height: 42px;
    border: 1px solid rgba(157, 211, 205, 0.72);
    border-radius: 12px;
    padding: 11px 9px 9px;
    background: rgba(238, 253, 250, 0.58);
    color: #486d69;
    font: inherit;
    font-size: 0.78rem;
    line-height: 20px;
    user-select: text;
    resize: none;
    overflow: hidden;
    outline: none;
    transition: border-color 0.16s ease, background 0.16s ease;
  }

  .custom-reminder textarea:focus {
    border-color: rgba(132, 201, 194, 0.82);
    background: rgba(228, 250, 246, 0.76);
  }

  .custom-reminder-error {
    min-height: 0;
    margin-top: 4px;
    color: #b05e50;
    font-size: 0.74rem;
  }

  .memo-list {
    display: grid;
    gap: 4px;
    margin-top: 9px;
    max-height: min(356px, calc(100vh - 260px));
    padding-right: 2px;
    overflow-y: auto;
    overscroll-behavior: contain;
    scrollbar-width: thin;
    scrollbar-color: rgba(145, 196, 191, 0.5) transparent;
  }

  .memo-list:empty {
    display: none;
  }

  .memo-item {
    display: grid;
    grid-template-columns: 12px 1fr 18px;
    align-items: start;
    gap: 5px;
    width: 100%;
    padding: 3px 5px;
    border: 1px solid rgba(218, 207, 196, 0.46);
    border-radius: 7px;
    background: rgba(255, 255, 253, 0.42);
    color: #766b62;
  }

  .memo-item.done {
    opacity: 0.52;
  }

  .memo-item.done .memo-text {
    text-decoration: line-through;
  }

  .memo-check {
    width: 11px;
    height: 11px;
    margin-top: 1px;
    accent-color: #c9b49d;
    cursor: pointer;
  }

  .memo-text {
    display: block;
    font-size: 0.68rem;
    line-height: 1.2;
    word-break: break-word;
  }

  .memo-time {
    display: block;
    margin-top: 2px;
    color: #9a8d82;
    font-size: 0.6rem;
    line-height: 1.2;
  }

  .memo-delete {
    width: 17px;
    height: 17px;
    border: 0;
    border-radius: 50%;
    background: transparent;
    color: #aaa097;
    cursor: pointer;
  }

  .timer-option strong {
    font-size: 0.9rem;
  }

  .tomato-progress {
    display: inline-flex;
    align-items: center;
    gap: 1px;
    min-height: 16px;
    margin-left: 4px;
    vertical-align: -2px;
  }

  .tomato-progress:empty {
    display: none;
  }

  .tomato-mark {
    display: inline-block;
    font-size: 0.72rem;
    line-height: 1;
  }

  .tomato-mark.half {
    width: 0.39rem;
    overflow: hidden;
    white-space: nowrap;
  }

  .timer-badge {
    position: absolute;
    left: 20px;
    top: 20px;
    z-index: 20;
    min-width: 112px;
    padding: 8px 12px;
    border: 1px solid rgba(213, 174, 125, 0.44);
    border-radius: 20px 20px 15px 15px;
    background: rgba(255, 252, 247, 0.72);
    box-shadow: 0 7px 18px rgba(112, 76, 43, 0.08);
    color: #674d3b;
    cursor: pointer;
    text-align: left;
    backdrop-filter: blur(10px);
  }

  .timer-badge-label {
    display: block;
    color: #96765e;
    font-size: 0.7rem;
  }

  .timer-badge-label::before {
    content: "⌛️ ";
  }

  .timer-badge-time {
    display: block;
    margin-top: 1px;
    font-size: 0.98rem;
    font-variant-numeric: tabular-nums;
  }

  /* ---- Shadow ---- */
  .shadow {
    position: absolute;
    left: 0;
    top: 0;
    width: 120px;
    height: 16px;
    opacity: 0;
    background: radial-gradient(ellipse, rgba(80, 61, 45, 0.15) 0%, rgba(80, 61, 45, 0.04) 55%, transparent 72%);
    border-radius: 50%;
    z-index: 1;
    pointer-events: none;
    transform: translate(-50%, 72px);
    transition: opacity 0.25s ease, width 0.2s ease;
  }

  .shadow.perch-hidden {
    opacity: 0 !important;
  }

  /* ---- Hint ---- */
  .hint {
    position: absolute;
    left: 50%;
    bottom: max(28px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    color: #9a8068;
    font-size: 0.92rem;
    letter-spacing: 0.04em;
    animation: hintPulse 2s infinite;
    z-index: 10;
    pointer-events: none;
  }

  @keyframes hintPulse {
    0%,100% { opacity: 0.48; }
    50% { opacity: 1; }
  }

  @keyframes mangoBreath {
    0%,100% {
      transform: scale(1);
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.18));
    }
    50% {
      transform: scale(1.035) translateY(-3px);
      filter: drop-shadow(0 12px 28px rgba(0,0,0,0.16));
    }
  }

  @keyframes weatherBubbleSpit {
    0% {
      opacity: 0;
      transform: translate(var(--bubble-from-x, 160px), 62px) scale(0.12);
    }
    34% { opacity: 1; }
    72% { transform: translate(-5px, -4px) scale(1.08); }
    100% {
      opacity: 1;
      transform: translate(0, 0) scale(1);
    }
  }

  @keyframes weatherBubbleFloat {
    0%,100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-6px) rotate(1.5deg); }
  }

  @keyframes weatherBubbleBurst {
    0% { opacity: 1; transform: scale(1); }
    45% { opacity: 0.9; transform: scale(1.32); }
    100% { opacity: 0; transform: scale(1.7); }
  }

  @keyframes weatherBubbleSpark {
    0% { opacity: 0.9; transform: translate(-50%, -50%) scale(0.5); }
    100% {
      opacity: 0;
      transform: translate(calc(-50% + var(--spark-x)), calc(-50% + var(--spark-y))) scale(1.25);
    }
  }

  /* ---- Particles ---- */
  .particle {
    position: absolute;
    z-index: 6;
    pointer-events: none;
    background: gold;
  }

  .particle.star-4 {
    clip-path: polygon(50% 0%, 61% 38%, 100% 50%, 61% 62%, 50% 100%, 39% 62%, 0% 50%, 39% 38%);
  }

  .particle.diamond {
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  }

  .particle.spark {
    clip-path: polygon(50% 0%, 65% 35%, 100% 45%, 70% 55%, 80% 100%, 50% 65%, 20% 100%, 30% 55%, 0% 45%, 35% 35%);
  }

  /* ---- Reset ---- */
  .reset-btn {
    position: absolute;
    top: 20px;
    right: 24px;
    background: #f0e0d0;
    border: 0;
    padding: 8px 18px;
    border-radius: 18px;
    font-size: 0.85rem;
    color: #6a5040;
    cursor: pointer;
    z-index: 20;
    transition: background 0.2s ease, opacity 0.2s ease, transform 0.2s ease;
    opacity: 0.5;
  }

  .reset-btn:hover {
    background: #e0c8b0;
    opacity: 1;
    transform: translateY(-1px);
  }

  @keyframes birdIdle {
    0%,100% { transform: translateY(0) rotate(0deg) scaleX(var(--face, 1)); }
    50% { transform: translateY(-2px) rotate(-0.6deg) scaleX(var(--face, 1)); }
  }

  @keyframes birdNuzzle {
    0%,100% { transform: translateX(-3px) translateY(0) rotate(-3deg) scaleX(var(--face, 1)); }
    50% { transform: translateX(6px) translateY(-2px) rotate(3deg) scaleX(var(--face, 1)); }
  }

  @keyframes birdRunFlap {
    0%,100% { transform: translateY(0) rotate(-4deg) skewX(-1deg) scaleX(var(--face, 1)); }
    35% { transform: translateY(-5px) rotate(5deg) skewX(2deg) scaleX(var(--face, 1)); }
    70% { transform: translateY(1px) rotate(-2deg) skewX(-2deg) scaleX(var(--face, 1)); }
  }

  @keyframes birdPeck {
    0%,100% { transform: translateX(0) rotate(0deg) scaleX(var(--face, 1)); }
    45% { transform: translateX(var(--peck-x, 18px)) translateY(4px) rotate(var(--peck-rot, 13deg)) scaleX(var(--face, 1)); }
  }

  @keyframes birdSleepBreath {
    0%,100% { transform: translateY(0) scaleX(var(--face, 1)); }
    50% { transform: translateY(1px) scaleX(var(--face, 1)); }
  }

  @keyframes birdPerchTilt {
    0%, 100% { transform: scaleX(var(--face, 1)) scaleY(1) rotate(0deg); }
    42%, 68% { transform: scaleX(var(--face, 1)) scaleY(1.008) rotate(2.2deg); }
  }

  @keyframes birdPerchBreath {
    0%, 100% { transform: scaleX(var(--face, 1)) scaleY(1); }
    50% { transform: scaleX(var(--face, 1)) scaleY(1.012); }
  }

  @keyframes dialogPop {
    from { opacity: 0; transform: scale(0.86) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes reminderBounce {
    from { opacity: 0; transform: translateY(20px) scale(0.88); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes reminderPopIn {
    0% { opacity: 0; transform: translate(82px, 55px) scale(0.2); }
    72% { opacity: 1; transform: translate(-4px, -3px) scale(1.06); }
    100% { opacity: 1; transform: translate(0, 0) scale(1); }
  }

  @keyframes reminderPopOut {
    from { opacity: 1; transform: translate(0, 0) scale(1); }

<body>

<div class="stage" id="stage">

  <div class="mango-wrap" id="mangoWrap">

  <div class="bird-wrap" id="birdWrap" aria-label="小鸟" role="img">

    <div class="weather-bubble" id="weatherBubble" aria-hidden="true">

      <span class="weather-bubble-temperature" id="weatherBubbleTemperature"></span>

      <span class="weather-bubble-spark" style="--spark-x:3px;--spark-y:-40px;--spark-delay:.02s"></span>
      <span class="weather-bubble-spark" style="--spark-x:35px;--spark-y:-18px;--spark-delay:.04s"></span>

  <div class="hint" id="hint">点一下芒果</div>
  <button class="timer-badge" id="timerBadge" type="button" hidden aria-label="查看当前计时">

    <div class="timer-options">
      <button class="timer-option" type="button" data-focus-minutes="30" data-rest-minutes="5" data-focus-ms="10000" data-rest-ms="5000" data-display-label="10s/5s" data-initial-countdown="0:10" data-tomato-halves="1">
        <strong class="timer-option-label">10s/5s</strong>
        <span class="timer-option-countdown">⌛️ 0:10</span>
      </button>
      <button class="timer-option" type="button" data-focus-minutes="60" data-rest-minutes="10" data-tomato-halves="2">

      </div>
      <div class="custom-reminder-error" id="customReminderError" aria-live="polite"></div>
    </form>
    <div class="memo-list" id="memoList" aria-label="待办事项"></div>

  <button class="reset-btn" id="resetBtn" type="button">再来一次</button>

<script>
const $ = id => document.getElementById(id);
const mangoWrap = $('mangoWrap');
const birdWrap = $('birdWrap');
const birdImg = $('birdImg');
const weatherBubble = $('weatherBubble');
const weatherBubbleIcon = $('weatherBubbleIcon');

const shadow = $('shadow');
const hint = $('hint');
const resetBtn = $('resetBtn');
const stage = $('stage');

const timerBadgeLabel = $('timerBadgeLabel');
const timerBadgeTime = $('timerBadgeTime');
const timerDialog = $('timerDialog');
const tomatoProgress = $('tomatoProgress');
const reminderPop = $('reminderPop');

const customReminderText = $('customReminderText');
const customReminderError = $('customReminderError');

const timerOptionButtons = [...timerDialog.querySelectorAll('.timer-option')];
const timerContinue = $('timerContinue');
const timerCancel = $('timerCancel');
const defaultBirdSrc = 'assets/终图_绿翅.png';

const fallbackWeatherLocation = {

const weatherVisuals = [
  { codes: [0], icon: '☀️', label: '晴' },
  { codes: [1, 2], icon: '🌤️', label: '晴间多云' },
  { codes: [3], icon: '☁️', label: '阴' },

];

const frameSets = {

  ]
};

const loadedFrames = {};

const config = {
  headNuzzleRadiusX: 25,
  leftHeadNuzzleRadiusX: 32,
  headNuzzleRadiusY: 38,
  headOffsetX: 54,
  leftHeadOffsetX: 66,
  headOffsetY: -46,
  headBottomOffsetY: -8,
  nuzzleLoops: 3,

  beakOffsetX: 68,
  beakOffsetY: -20,
  visibleBodyRatio: 0.62,
  chaseClickBodyScale: 1,
  hatchDuration: 820,

  chaseSpeed: 0.2,
  nuzzleEase: 0.13,
  screenPadding: 72,
  headBlinkIdleDelay: 4000,

  sleepFrameDuration: 420,
  ruffleFrameDuration: 240
};

const pet = {
  state: 'hidden',
  ready: false,
  x: window.innerWidth / 2,
  y: window.innerHeight / 2,
  scale: 0.3,
  face: 1,
  pointer: null,
  nuzzleArmed: true,
  nuzzleHoverTimer: null,
  timers: new Set(),
  chaseFrame: null,
  nuzzleFrame: null,
  frameTimer: null,
  frameIndex: 0,
  inactivityTimer: null,
  inactivityPhase: 'headBlink',

  positionAnimation: null,
